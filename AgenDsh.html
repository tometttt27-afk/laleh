// --- SESSION CHECKER ---

const rawUrl = "<?= typeof url !== 'undefined' ? url : '' ?>"; 
const appUrl = rawUrl.startsWith('http') ? rawUrl : '';

function safeRedirect(page) {
    if (!appUrl) {
        Swal.fire('Navigasi', `Mode Preview: Menuju halaman ${page}`, 'info');
        return;
    }
    const targetUrl = appUrl + "?page=" + page;
    try { window.top.location.href = targetUrl; } catch (e) { window.location.href = targetUrl; }
}

function formatSafeDate(dateVal) {
    if (!dateVal) return '-';
    const d = new Date(dateVal);
    if (isNaN(d.getTime())) return 'Tgl Invalid';
    return d.toLocaleDateString('id-ID', {day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'});
}

// ==========================================
// FUNGSI UBAH PASSWORD VIA OTP
// ==========================================
function bukaModalUbahPw() {
    if(!state.user || !state.user.email) return;
    
    document.getElementById('emailUbahPw').value = state.user.email;
    document.getElementById('step1_otp').classList.remove('hidden');
    document.getElementById('step2_otp').classList.add('hidden');
    document.getElementById('step3_otp').classList.add('hidden');
    
    const otpInputs = document.getElementById('otp-pw-inputs');
    if (otpInputs) otpInputs.querySelectorAll('input').forEach(inp => inp.value = '');
    document.getElementById('pwBaru1').value = '';
    document.getElementById('pwBaru2').value = '';
    
    const modal = document.getElementById('modal-ubah-pw');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    lucide.createIcons();
}

function tutupModalUbahPw() {
    const modal = document.getElementById('modal-ubah-pw');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
}

function moveToNextPw(current, event) {
    current.value = current.value.replace(/[^0-9]/g, '');
    if (current.value.length === 1) {
        let next = current.nextElementSibling;
        if (next && next.tagName === 'INPUT') next.focus();
    }
}

function moveToPrevPw(current, event) {
    if (event.key === "Backspace" && current.value === "") {
        let prev = current.previousElementSibling;
        if (prev && prev.tagName === 'INPUT') prev.focus();
    }
}

function kirimOtp() {
    let email = document.getElementById('emailUbahPw').value;
    let btn = document.getElementById('btnKirimOtp');
    
    btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin mx-auto"></i>';
    btn.disabled = true;
    lucide.createIcons();

    if (typeof google === 'undefined') {
        setTimeout(() => {
            btn.innerHTML = 'Kirim Kode OTP';
            btn.disabled = false;
            document.getElementById('step1_otp').classList.add('hidden');
            document.getElementById('step2_otp').classList.remove('hidden');
            Swal.fire({icon: 'success', title: 'Terkirim', text: 'OTP Simulasi terkirim (Preview)', timer: 1500});
        }, 1000);
        return;
    }

    google.script.run.withSuccessHandler(function(res) {
        btn.innerHTML = 'Kirim Kode OTP';
        btn.disabled = false;
        if(res.success) {
            document.getElementById('step1_otp').classList.add('hidden');
            document.getElementById('step2_otp').classList.remove('hidden');
            Swal.fire({icon: 'success', title: 'Terkirim', text: res.message, confirmButtonColor: '#825E4A'});
        } else {
            Swal.fire('Gagal', res.message, 'error');
        }
    }).kirimOtpUbahPassword(email);
}

function cekOtp() {
    let email = document.getElementById('emailUbahPw').value;
    let otpCode = "";
    document.getElementById('otp-pw-inputs').querySelectorAll('input').forEach(inp => otpCode += inp.value);
    
    if(otpCode.length < 6) {
        Swal.fire('Informasi', 'Masukkan 6 digit kode OTP lengkap.', 'warning');
        return;
    }

    let btn = document.getElementById('btnCekOtp');
    btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin mx-auto"></i>';
    btn.disabled = true;
    lucide.createIcons();

    if (typeof google === 'undefined') {
        setTimeout(() => {
            btn.innerHTML = 'Verifikasi OTP';
            btn.disabled = false;
            document.getElementById('step2_otp').classList.add('hidden');
            document.getElementById('step3_otp').classList.remove('hidden');
        }, 1000);
        return;
    }

    google.script.run.withSuccessHandler(function(res) {
        btn.innerHTML = 'Verifikasi OTP';
        btn.disabled = false;
        if(res.success) {
            document.getElementById('step2_otp').classList.add('hidden');
            document.getElementById('step3_otp').classList.remove('hidden');
        } else {
            Swal.fire('Gagal', res.message, 'error');
        }
    }).verifikasiOtpUbahPassword(email, otpCode);
}

function simpanPwBaru() {
    let email = document.getElementById('emailUbahPw').value;
    let pw1 = document.getElementById('pwBaru1').value;
    let pw2 = document.getElementById('pwBaru2').value;
    let btn = document.getElementById('btnSimpanPw');

    if(pw1 === '' || pw2 === '') { Swal.fire('Gagal', 'Password tidak boleh kosong.', 'error'); return; }
    if(pw1 !== pw2) { Swal.fire('Gagal', 'Konfirmasi password tidak cocok.', 'error'); return; }
    if(pw1.length < 8) { Swal.fire('Gagal', 'Password minimal 8 karakter.', 'error'); return; }

    btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin mx-auto"></i>';
    btn.disabled = true;
    lucide.createIcons();

    if (typeof google === 'undefined') {
        setTimeout(() => {
            btn.innerHTML = 'Simpan Password Baru';
            btn.disabled = false;
            tutupModalUbahPw();
            Swal.fire('Berhasil', 'Password berhasil diubah (Preview Mode).', 'success');
        }, 1000);
        return;
    }

    google.script.run.withSuccessHandler(function(res) {
        btn.innerHTML = 'Simpan Password Baru';
        btn.disabled = false;
        if(res.success) {
            tutupModalUbahPw();
            Swal.fire({icon: 'success', title: 'Berhasil', text: res.message, confirmButtonColor: '#825E4A'});
        } else {
            Swal.fire('Gagal', res.message, 'error');
        }
    }).simpanPasswordBaruOTP(email, pw1);
}

function togglePassUbahPw(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text'; icon.setAttribute('data-lucide', 'eye-off');
    } else {
        input.type = 'password'; icon.setAttribute('data-lucide', 'eye');
    }
    lucide.createIcons();
}

// ==========================================
// FUNGSI ULASAN / REVIEW AGEN
// ==========================================
function openReviewModal() {
    document.getElementById('r_rating').value = '5';
    document.getElementById('r_pesan').value = '';
    updateStarDisplay(5);
    const modal = document.getElementById('modal-review');
    if(modal) { modal.classList.remove('hidden'); modal.classList.add('flex'); }
    lucide.createIcons();
}

function closeReviewModal() {
    const modal = document.getElementById('modal-review');
    if(modal) { modal.classList.add('hidden'); modal.classList.remove('flex'); }
}

function setRating(val) {
    document.getElementById('r_rating').value = val;
    updateStarDisplay(val);
}

function updateStarDisplay(val) {
    for(let i = 1; i <= 5; i++) {
        const star = document.getElementById('star-' + i);
        if(star) {
            if(i <= val) {
                star.classList.add('text-yellow-400');
                star.classList.remove('text-gray-300');
            } else {
                star.classList.remove('text-yellow-400');
                star.classList.add('text-gray-300');
            }
        }
    }
}

function submitReviewForm(e) {
    e.preventDefault();
    const rating = parseInt(document.getElementById('r_rating').value) || 5;
    const pesan = document.getElementById('r_pesan').value.trim();
    
    if(!pesan) {
        Swal.fire('Peringatan', 'Silakan tulis pesan ulasan Anda.', 'warning');
        return;
    }

    const btn = document.getElementById('btnSubmitReview');
    btn.innerHTML = "Mengirim..."; btn.disabled = true;

    const data = {
        email_agen: state.user.email,
        nama_agen: state.user.name,
        rating: rating,
        pesan: pesan
    };

    if (typeof google === 'undefined') {
        setTimeout(() => {
            Swal.fire({icon: 'success', title: 'Terkirim!', text: 'Ulasan Anda berhasil dikirim (Preview)', confirmButtonColor: '#825E4A'});
            closeReviewModal();
            btn.innerHTML = "Kirim Ulasan"; btn.disabled = false;
        }, 1000);
        return;
    }

    google.script.run
        .withSuccessHandler(function(res) {
            btn.innerHTML = "Kirim Ulasan"; btn.disabled = false;
            if(res.success) {
                closeReviewModal();
                Swal.fire({icon: 'success', title: 'Terkirim!', text: res.message, confirmButtonColor: '#825E4A'});
            } else {
                Swal.fire('Gagal', res.message, 'error');
            }
        })
        .withFailureHandler(function(err) {
            btn.innerHTML = "Kirim Ulasan"; btn.disabled = false;
            Swal.fire('Error', err.message, 'error');
        })
        .submitReview(data);
}

async function exportToExcel() {
    if (typeof ExcelJS === 'undefined') {
        Swal.fire('Error', 'Sistem belum siap, pastikan koneksi internet lancar untuk memuat library Excel.', 'error');
        return;
    }

    Swal.fire({ title: 'Menyiapkan File Excel...', text: 'Mohon tunggu sebentar', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

    try {
        const workbook = new ExcelJS.Workbook();
        const worksheet = workbook.addWorksheet('Pesanan Saya');

        worksheet.properties.defaultRowHeight = 21;
        let currentRow = 1;

        let nameRow = worksheet.getRow(currentRow);
        nameRow.height = 21;
        worksheet.mergeCells(currentRow, 1, currentRow, 8);
        let nameCell = nameRow.getCell(1);
        nameCell.value = `NAMA AGEN: ${state.user.name.toUpperCase()}`;
        nameCell.font = { name: 'Arial', size: 10, bold: true };
        nameCell.alignment = { vertical: 'middle' };
        currentRow++;

        worksheet.getRow(currentRow).height = 10; 
        currentRow++;

        let agentTotalQty = state.orders.reduce((sum, o) => sum + (parseInt(o.qty) || 0), 0);
        let agentTotalPrice = state.orders.reduce((sum, o) => sum + (parseInt(o.total_harga) || 0), 0);

        const colorThemes = [
            { main: 'FF825E4A', sub: 'FFFDF8F5', text: 'FF825E4A' }, 
            { main: 'FF0D9488', sub: 'FFF0FDFA', text: 'FF0F766E' }, 
            { main: 'FFE11D48', sub: 'FFFFF1F2', text: 'FFBE123C' }, 
            { main: 'FF4F46E5', sub: 'FFEEF2FF', text: 'FF4338CA' }, 
            { main: 'FF059669', sub: 'FFECFDF5', text: 'FF047857' }
        ];

        let exportProducts = [];
        state.products.forEach(p => {
            let isAktif = p.status === 'Aktif';
            let productOrders = state.orders.filter(o => o.id_produk === p.id || o.nama_produk === p.name);
            
            if (isAktif || productOrders.length > 0) {
                let sizes = p.sizeDetails && p.sizeDetails.length > 0 ? p.sizeDetails.map(d=>d.size) : (p.sizes ? p.sizes.split(',').map(s=>s.trim()) : []);
                let colors = p.colors ? p.colors.split(',').map(c=>c.trim()) : [];
                let allOrderedColors = productOrders.map(o => o.warna);
                let allOrderedSizes = productOrders.map(o => o.ukuran);
                let uniqueColors = [...new Set([...colors, ...allOrderedColors])].filter(Boolean);
                let uniqueSizes = [...new Set([...sizes, ...allOrderedSizes])].filter(Boolean);

                if(uniqueColors.length === 0) uniqueColors = ['-'];
                if(uniqueSizes.length === 0) uniqueSizes = ['-'];

                exportProducts.push({ ...p, exportColors: uniqueColors, exportSizes: uniqueSizes });
            }
        });

        let themeIndex = 0;
        let tableStartRow = currentRow;
        let currentCol = 1;
        let maxRowForAgent = tableStartRow; 

        exportProducts.forEach((p) => {
            let productOrders = state.orders.filter(o => o.id_produk === p.id || o.nama_produk === p.name);
            let uniqueColors = p.exportColors;
            let uniqueSizes = p.exportSizes;

            let theme = colorThemes[themeIndex % colorThemes.length];
            let totalCols = 1 + uniqueSizes.length + 1; 
            let localRow = tableStartRow;

            worksheet.getColumn(currentCol).width = 25; 
            for(let i=0; i<uniqueSizes.length; i++) worksheet.getColumn(currentCol + 1 + i).width = 8; 
            worksheet.getColumn(currentCol + 1 + uniqueSizes.length).width = 40; 
            worksheet.getColumn(currentCol + totalCols).width = 3; 

            let prodRow = worksheet.getRow(localRow);
            worksheet.mergeCells(localRow, currentCol, localRow, currentCol + totalCols - 1);
            let prodCell = prodRow.getCell(currentCol);
            prodCell.value = p.name;
            prodCell.fill = { type: 'pattern', pattern:'solid', fgColor:{argb: theme.main} };
            prodCell.font = { name: 'Arial', size: 10, bold: true, color: {argb: 'FFFFFFFF'} };
            prodCell.alignment = { horizontal: 'center', vertical: 'middle' };
            prodRow.height = 21;
            localRow++;

            let headerRow = worksheet.getRow(localRow);
            headerRow.height = 21;
            headerRow.getCell(currentCol).value = "Warna";
            uniqueSizes.forEach((s, idx) => { headerRow.getCell(currentCol + 1 + idx).value = s; });
            headerRow.getCell(currentCol + 1 + uniqueSizes.length).value = "Keterangan";

            for(let i=0; i<totalCols; i++) {
                let cell = headerRow.getCell(currentCol + i);
                cell.fill = { type: 'pattern', pattern:'solid', fgColor:{argb: theme.sub} };
                cell.font = { name: 'Arial', size: 10, bold: true, color: {argb: theme.text} };
                cell.alignment = { horizontal: 'center', vertical: 'middle' };
                cell.border = { top: {style:'thin', color: {argb:'FFCCCCCC'}}, left: {style:'thin', color: {argb:'FFCCCCCC'}}, bottom: {style:'medium', color: {argb:'FFCCCCCC'}}, right: {style:'thin', color: {argb:'FFCCCCCC'}} };
            }
            localRow++;

            let productTotalQty = 0;
            uniqueColors.forEach(c => {
                let colorOrders = productOrders.filter(o => o.warna === c);
                let row = worksheet.getRow(localRow);
                row.height = 21;

                let colorCell = row.getCell(currentCol);
                colorCell.value = c;
                colorCell.font = { name: 'Arial', size: 10, bold: true };
                colorCell.alignment = { vertical: 'middle' };
                
                uniqueSizes.forEach((s, idx) => {
                    let ordersForSize = colorOrders.filter(o => o.ukuran === s);
                    let qty = ordersForSize.reduce((acc, curr) => acc + (parseInt(curr.qty) || 0), 0);
                    let cell = row.getCell(currentCol + 1 + idx);
                    cell.value = qty > 0 ? qty : '-'; 
                    cell.font = { name: 'Arial', size: 10, bold: true };
                    cell.alignment = { horizontal: 'center', vertical: 'middle' };
                });

                let notes = colorOrders.length > 0 ? [...new Set(colorOrders.map(o => o.catatan).filter(n=>n))].join(', ') : '';
                let ketCell = row.getCell(currentCol + 1 + uniqueSizes.length);
                ketCell.value = notes;
                ketCell.font = { name: 'Arial', size: 10 };
                ketCell.alignment = { vertical: 'middle' };

                for(let i=0; i<totalCols; i++) {
                    row.getCell(currentCol + i).border = { top: {style:'thin', color: {argb:'FFCCCCCC'}}, left: {style:'thin', color: {argb:'FFCCCCCC'}}, bottom: {style:'thin', color: {argb:'FFCCCCCC'}}, right: {style:'thin', color: {argb:'FFCCCCCC'}} };
                }
                productTotalQty += colorOrders.reduce((sum, o) => sum + (parseInt(o.qty) || 0), 0);
                localRow++;
            });

            let footRow = worksheet.getRow(localRow);
            footRow.height = 21;
            let fCell1 = footRow.getCell(currentCol);
            fCell1.value = "TOTAL";
            fCell1.font = { name: 'Arial', size: 10, bold: true };
            fCell1.fill = { type: 'pattern', pattern:'solid', fgColor:{argb: 'FFF3F4F6'} }; 
            fCell1.alignment = { horizontal: 'right', vertical: 'middle' };

            if(uniqueSizes.length > 1) worksheet.mergeCells(localRow, currentCol + 1, localRow, currentCol + uniqueSizes.length);
            
            let fCell2 = footRow.getCell(currentCol + 1);
            fCell2.value = productTotalQty > 0 ? productTotalQty : '-';
            fCell2.font = { name: 'Arial', size: 11, bold: true, color: {argb: 'FF825E4A'} };
            fCell2.fill = { type: 'pattern', pattern:'solid', fgColor:{argb: 'FFF3F4F6'} };
            fCell2.alignment = { horizontal: 'center', vertical: 'middle' };

            for(let i=0; i<totalCols; i++) {
                let cell = footRow.getCell(currentCol + i);
                if (!cell.fill) cell.fill = { type: 'pattern', pattern:'solid', fgColor:{argb: 'FFF3F4F6'} };
                cell.border = { top: {style:'medium', color: {argb:'FFA3A8B8'}}, left: {style:'thin', color: {argb:'FFCCCCCC'}}, bottom: {style:'thin', color: {argb:'FFCCCCCC'}}, right: {style:'thin', color: {argb:'FFCCCCCC'}} };
            }
            localRow++;
            
            if (localRow > maxRowForAgent) maxRowForAgent = localRow;
            currentCol += totalCols + 1; 
            themeIndex++;
        });

        currentRow = maxRowForAgent + 1;

        let agentTotalWeight = state.orders.reduce((sum, o) => sum + (parseInt(o.berat) || 0), 0);

        let sumRow1 = worksheet.getRow(currentRow);
        sumRow1.height = 21;
        sumRow1.getCell(1).value = "TOTAL KESELURUHAN ITEM & BERAT";
        sumRow1.getCell(1).font = { name: 'Arial', size: 10, bold: true };
        sumRow1.getCell(2).value = `${agentTotalQty} pcs (${agentTotalWeight} gr)`;
        sumRow1.getCell(2).font = { name: 'Arial', size: 10, bold: true, color: {argb: 'FF825E4A'} };
        currentRow++;

        let sumRow2 = worksheet.getRow(currentRow);
        sumRow2.height = 21;
        sumRow2.getCell(1).value = "TOTAL HARGA BARANG";
        sumRow2.getCell(1).font = { name: 'Arial', size: 10, bold: true };
        sumRow2.getCell(2).value = "Rp " + agentTotalPrice.toLocaleString('id-ID');
        sumRow2.getCell(2).font = { name: 'Arial', size: 10, bold: true, color: {argb: 'FF059669'} };
        currentRow++;

        // EXPORT EXCEL: TAMPILKAN RINCIAN MULTI-RESI JASA KIRIM
        let ongkirTotal = state.billing ? parseInt(state.billing.ongkir) || 0 : 0;
        let pengirimanArr = state.billing && state.billing.pengiriman ? state.billing.pengiriman : [];

        let sumRow3 = worksheet.getRow(currentRow);
        sumRow3.height = 21;
        sumRow3.getCell(1).value = "TOTAL ONGKOS KIRIM";
        sumRow3.getCell(1).font = { name: 'Arial', size: 10, bold: true };
        sumRow3.getCell(2).value = "+ Rp " + ongkirTotal.toLocaleString('id-ID');
        sumRow3.getCell(2).font = { name: 'Arial', size: 10, bold: true, color: {argb: 'FF825E4A'} };
        currentRow++;

        if (pengirimanArr.length > 0) {
            pengirimanArr.forEach(p => {
                let pRow = worksheet.getRow(currentRow);
                pRow.height = 18;
                pRow.getCell(1).value = `   - ${p.ekspedisi || 'Kurir'}`;
                pRow.getCell(1).font = { name: 'Arial', size: 9, italic: true };
                pRow.getCell(2).value = "Rp " + Number(p.ongkir).toLocaleString('id-ID');
                pRow.getCell(2).font = { name: 'Arial', size: 9, italic: true, color: {argb: 'FF666666'} };
                currentRow++;
            });
        }

        let danaMasuk = state.billing ? parseInt(state.billing.dana_masuk) || 0 : 0;
        let sisaTagihanRaw = (agentTotalPrice + ongkirTotal) - danaMasuk;

        let sumRow4 = worksheet.getRow(currentRow);
        sumRow4.height = 21;
        sumRow4.getCell(1).value = "TELAH DIBAYAR (DANA MASUK)";
        sumRow4.getCell(1).font = { name: 'Arial', size: 10, bold: true };
        sumRow4.getCell(2).value = "- Rp " + danaMasuk.toLocaleString('id-ID');
        sumRow4.getCell(2).font = { name: 'Arial', size: 10, bold: true, color: {argb: 'FF059669'} };
        currentRow++;

        let sumRow5 = worksheet.getRow(currentRow);
        sumRow5.height = 21;
        sumRow5.getCell(1).value = "SISA TAGIHAN / KELEBIHAN";
        sumRow5.getCell(1).font = { name: 'Arial', size: 10, bold: true };
        
        let sisaText = "";
        let sisaColor = 'FF000000';
        if (sisaTagihanRaw > 0) {
            sisaText = "Kurang Rp " + sisaTagihanRaw.toLocaleString('id-ID');
            sisaColor = 'FFDC2626'; 
        } else if (sisaTagihanRaw < 0) {
            sisaText = "Lebih Rp " + Math.abs(sisaTagihanRaw).toLocaleString('id-ID');
            sisaColor = 'FF059669'; 
        } else {
            sisaText = "Rp 0";
            sisaColor = 'FF6B7280'; 
        }

        sumRow5.getCell(2).value = sisaText;
        sumRow5.getCell(2).font = { name: 'Arial', size: 10, bold: true, color: {argb: sisaColor} };

        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        const fileName = "Rekap_Pesanan_Saya_Laleh_" + new Date().toISOString().slice(0,10) + ".xlsx";
        saveAs(blob, fileName);

        Swal.close();

    } catch (error) {
        console.error(error);
        Swal.fire('Error Export', 'Terjadi kesalahan saat memproses file Excel.', 'error');
    }
}

// FUNGSI TRANSAKSI / PEMESANAN (MODAL)

function placeOrder(productId) {
    if (!state.user.address || !state.user.address.jalan) {
        Swal.fire({
            icon: 'warning', title: 'Alamat Belum Lengkap',
            text: 'Silakan lengkapi alamat pengiriman Anda di menu Profil sebelum melakukan pemesanan.',
            confirmButtonColor: '#825E4A', confirmButtonText: 'Isi Alamat Sekarang', allowOutsideClick: false
        }).then((result) => { if (result.isConfirmed) navigateTo('profile'); });
        return; 
    }

    const product = state.products.find(p => p.id === productId);
    if (!product) return;
    
    // VALIDASI WAKTU REAL-TIME: Mencegah order jika agen tidak refresh halaman
    const now = new Date().getTime();
    const poStart = new Date(product.poStart).getTime();
    const poEnd = new Date(product.poEnd).getTime();

    if (now > poEnd) {
        Swal.fire('PO Telah Ditutup', 'Maaf, batas waktu Pre-Order untuk produk ini sudah berakhir.', 'error');
        renderApp(); 
        return;
    }
    if (now < poStart) {
        Swal.fire('PO Belum Buka', 'Maaf, waktu Pre-Order untuk produk ini belum dimulai.', 'warning');
        return;
    }
    
    state.selectedProduct = product;
    document.getElementById('m_prod_name').innerText = product.name;
    document.getElementById('m_prod_desc').innerText = product.desc || 'Tidak ada deskripsi.';
    document.getElementById('m_prod_image').src = product.photos && product.photos.length > 0 ? product.photos[0] : product.image;
    
    const sizesArr = product.sizeDetails && product.sizeDetails.length > 0 
        ? product.sizeDetails.map(d => d.size) 
        : (product.sizes ? product.sizes.split(',').map(s => s.trim()) : []);
        
    const colorsArr = product.colors ? product.colors.split(',').map(c => c.trim()) : [];
    
    const sizeSelect = document.getElementById('o_size');
    sizeSelect.innerHTML = sizesArr.length > 0 ? sizesArr.map(s => `<option value="${s}">${s}</option>`).join('') : '<option value="-">-</option>';
    
    const colorSelect = document.getElementById('o_color');
    colorSelect.innerHTML = colorsArr.length > 0 ? colorsArr.map(c => `<option value="${c}">${c}</option>`).join('') : '<option value="-">-</option>';
    
    document.getElementById('o_qty').value = 1;
    document.getElementById('o_notes').value = '';
    
    updateSizeModal('order'); 

    const modal = document.getElementById('modal-order');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
}

function updateSizeModal(type) {
    let product = state.selectedProduct;
    let sizeSelectId = type === 'order' ? 'o_size' : 'e_size';
    let priceElementId = type === 'order' ? 'm_prod_price' : 'e_prod_price';
    let weightElementId = type === 'order' ? 'm_prod_weight' : 'e_prod_weight';
    let qtyInputId = type === 'order' ? 'o_qty' : 'e_qty';

    if (!product || !product.sizeDetails) return;

    const selectedSize = document.getElementById(sizeSelectId).value;
    const detail = product.sizeDetails.find(d => d.size === selectedSize) || product.sizeDetails[0];
    
    if (detail) {
        let originalPriceFormatted = "Rp " + Number(detail.originalPrice).toLocaleString('id-ID');
        let finalPriceFormatted = "Rp " + Number(detail.finalPrice).toLocaleString('id-ID');

        let priceHtml = detail.discount > 0
            ? `${finalPriceFormatted} <span class="text-xs text-gray-400 line-through ml-1">${originalPriceFormatted}</span> <span class="bg-red-100 text-red-600 px-1.5 py-0.5 rounded text-[10px] ml-1 font-bold">-${detail.discount}%</span>`
            : finalPriceFormatted;
        
        document.getElementById(priceElementId).innerHTML = priceHtml;
        
        let wEl = document.getElementById(weightElementId);
        if(wEl) wEl.innerText = "Berat per pcs: " + detail.weight + " gram";
        
        let qtyEl = document.getElementById(qtyInputId);
        qtyEl.dataset.price = detail.finalPrice;
        qtyEl.dataset.weight = detail.weight;
    }

    if(type === 'order') updateTotalModal();
    else updateEditTotalModal();
}

function closeOrderModal() {
    const modal = document.getElementById('modal-order');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
    state.selectedProduct = null;
}

function updateTotalModal() {
    if (!state.selectedProduct) return;
    const qtyEl = document.getElementById('o_qty');
    const qty = parseInt(qtyEl.value) || 1;
    const price = parseInt(qtyEl.dataset.price) || 0;
    const weight = parseInt(qtyEl.dataset.weight) || 0;
    
    const total = qty * price;
    const totalWeight = qty * weight;
    
    document.getElementById('m_total_price').innerText = "Rp " + total.toLocaleString('id-ID');
    document.getElementById('m_total_weight').innerText = totalWeight > 0 ? `(Total Berat: ${totalWeight}g)` : '';
}

function submitOrderForm(e) {
    e.preventDefault();
    if (!state.selectedProduct) return;

    // VALIDASI WAKTU REAL-TIME KE-2 (Mencegah agen menekan konfirmasi jika ditinggal lama di popup form order)
    const now = new Date().getTime();
    const poEnd = new Date(state.selectedProduct.poEnd).getTime();
    if (now > poEnd) {
        Swal.fire('Waktu Habis', 'Maaf, waktu Pre-Order baru saja berakhir saat Anda sedang mengisi formulir ini.', 'error');
        closeOrderModal();
        renderApp();
        return;
    }

    const btn = document.getElementById('btnSubmitOrder');
    const qtyEl = document.getElementById('o_qty');
    const qty = parseInt(qtyEl.value) || 1;
    const price = parseInt(qtyEl.dataset.price) || 0;
    const weight = parseInt(qtyEl.dataset.weight) || 0;
    
    const orderData = {
        id_pesanan: "ORD-" + new Date().getTime(),
        id_produk: state.selectedProduct.id,
        nama_produk: state.selectedProduct.name,
        harga_satuan: price,
        qty: qty,
        total_harga: price * qty,
        berat: weight * qty, 
        ukuran: document.getElementById('o_size').value,
        warna: document.getElementById('o_color').value,
        catatan: document.getElementById('o_notes').value,
        email_agen: state.user.email,
        nama_agen: state.user.name,
        tanggal: new Date().toISOString()
    };

    btn.innerHTML = "Memproses..."; btn.disabled = true;

    if (typeof google === 'undefined') {
        setTimeout(() => {
            Swal.fire({icon: 'success', title: 'Berhasil!', text: 'Pesanan tersimpan (Preview Mode)', confirmButtonColor: '#825E4A'});
            closeOrderModal();
            btn.innerHTML = "Konfirmasi Pesanan"; btn.disabled = false;
        }, 1000);
        return;
    }

    google.script.run
        .withSuccessHandler(function(res) {
            btn.innerHTML = "Konfirmasi Pesanan"; btn.disabled = false;
            if(res.success) {
                closeOrderModal();
                Swal.fire({icon: 'success', title: 'Berhasil!', text: res.message, confirmButtonColor: '#825E4A'});
                loadOrders();
            } else { Swal.fire('Gagal', res.message, 'error'); }
        })
        .withFailureHandler(function(err) {
            btn.innerHTML = "Konfirmasi Pesanan"; btn.disabled = false;
            Swal.fire('Error Sistem', err.message, 'error');
        })
        .submitAgenOrder(orderData); 
}

function openEditOrderModal(orderId) {
    const order = state.orders.find(o => o.id_pesanan === orderId);
    if (!order) return;

    const product = state.products.find(p => p.name === order.nama_produk || p.id === order.id_produk);
    state.selectedProduct = product;

    document.getElementById('e_order_id').value = order.id_pesanan;
    document.getElementById('e_prod_name').innerText = order.nama_produk;
    
    const sizeSelect = document.getElementById('e_size');
    const colorSelect = document.getElementById('e_color');

    if (product) {
        const sizesArr = product.sizeDetails && product.sizeDetails.length > 0 
            ? product.sizeDetails.map(d => d.size) 
            : (product.sizes ? product.sizes.split(',').map(s => s.trim()) : []);
        const colorsArr = product.colors ? product.colors.split(',').map(c => c.trim()) : [];
        sizeSelect.innerHTML = sizesArr.length > 0 ? sizesArr.map(s => `<option value="${s}">${s}</option>`).join('') : '<option value="-">-</option>';
        colorSelect.innerHTML = colorsArr.length > 0 ? colorsArr.map(c => `<option value="${c}">${c}</option>`).join('') : '<option value="-">-</option>';
    } else {
        sizeSelect.innerHTML = `<option value="${order.ukuran}">${order.ukuran}</option>`;
        colorSelect.innerHTML = `<option value="${order.warna}">${order.warna}</option>`;
    }

    sizeSelect.value = order.ukuran;
    colorSelect.value = order.warna;
    document.getElementById('e_qty').value = order.qty;
    document.getElementById('e_notes').value = order.catatan || '';
    
    updateSizeModal('edit');

    const modal = document.getElementById('modal-edit-order');
    if (modal) { modal.classList.remove('hidden'); modal.classList.add('flex'); }
}

function closeEditOrderModal() {
    const modal = document.getElementById('modal-edit-order');
    if (modal) { modal.classList.add('hidden'); modal.classList.remove('flex'); state.selectedProduct = null; }
}

function updateEditTotalModal() {
    if (!state.selectedProduct) return;
    const qtyEl = document.getElementById('e_qty');
    const qty = parseInt(qtyEl.value) || 1;
    const price = parseInt(qtyEl.dataset.price) || 0;
    const weight = parseInt(qtyEl.dataset.weight) || 0;
    
    const total = qty * price;
    const totalWeight = qty * weight;
    
    document.getElementById('e_total_price').innerText = "Rp " + total.toLocaleString('id-ID');
    document.getElementById('e_total_weight').innerText = totalWeight > 0 ? `(Total Berat: ${totalWeight}g)` : '';
}

function deleteOrder(orderId) {
    Swal.fire({
        title: 'Batalkan Pesanan?', text: "Pesanan yang dibatalkan akan dihapus secara permanen.", icon: 'warning',
        showCancelButton: true, confirmButtonColor: '#ef4444', cancelButtonColor: '#825E4A', confirmButtonText: 'Ya, Batalkan', cancelButtonText: 'Kembali'
    }).then((result) => {
        if (result.isConfirmed) {
            Swal.fire({ title: 'Memproses...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
            
            if (typeof google === 'undefined') {
                state.orders = state.orders.filter(o => o.id_pesanan !== orderId);
                renderApp(); Swal.fire('Terhapus!', 'Pesanan berhasil dibatalkan (Preview Mode).', 'success'); return;
            }

            google.script.run
                .withSuccessHandler(function(res) {
                    if(res.success) { Swal.fire({icon: 'success', title: 'Dibatalkan!', text: res.message, timer: 1500, showConfirmButton: false}); loadOrders(); } 
                    else { Swal.fire('Gagal', res.message, 'error'); }
                })
                .withFailureHandler(function(err) { Swal.fire('Error Sistem', err.message, 'error'); })
                .deleteAgenOrder(orderId, state.user.email);
        }
    });
}

function openAddressModal() {
    const addr = state.user.address || {};
    document.getElementById('a_nama_penerima').value = addr.nama_penerima || state.user.name || '';
    document.getElementById('a_jalan').value = addr.jalan || '';
    document.getElementById('a_rt').value = addr.rt || '';
    document.getElementById('a_rw').value = addr.rw || '';
    document.getElementById('a_kec').value = addr.kecamatan || '';
    document.getElementById('a_kab').value = addr.kabupaten || '';
    document.getElementById('a_prov').value = addr.provinsi || '';
    document.getElementById('a_negara').value = addr.negara || 'Indonesia';
    
    const modal = document.getElementById('modal-address');
    if(modal) { modal.classList.remove('hidden'); modal.classList.add('flex'); }
}

function closeAddressModal() {
    const modal = document.getElementById('modal-address');
    if(modal) { modal.classList.add('hidden'); modal.classList.remove('flex'); }
}

function submitAddress(e) {
    e.preventDefault();
    const btn = document.getElementById('btnSaveAddress');
    
    const addrData = {
        nama_penerima: document.getElementById('a_nama_penerima').value,
        jalan: document.getElementById('a_jalan').value,
        rt: document.getElementById('a_rt').value,
        rw: document.getElementById('a_rw').value,
        kecamatan: document.getElementById('a_kec').value,
         kabupaten: document.getElementById('a_kab').value,
        provinsi: document.getElementById('a_prov').value,
        negara: document.getElementById('a_negara').value
    };

    btn.innerHTML = "Menyimpan..."; btn.disabled = true;

    if (typeof google === 'undefined') {
        state.user.address = addrData; 
        localStorage.setItem('laleh_user', JSON.stringify(state.user)); 
        Swal.fire({icon: 'success', title: 'Berhasil', text: 'Alamat disimpan (Preview)', confirmButtonColor: '#825E4A'});
        closeAddressModal(); renderApp(); return;
    }

    google.script.run
        .withSuccessHandler(function(res) {
            btn.innerHTML = "Simpan Alamat"; btn.disabled = false;
            if(res.success) {
                state.user.address = addrData;
                localStorage.setItem('laleh_user', JSON.stringify(state.user));
                closeAddressModal();
                Swal.fire({icon: 'success', title: 'Berhasil!', text: res.message, confirmButtonColor: '#825E4A'});
                renderApp(); 
            } else { Swal.fire('Gagal', res.message, 'error'); }
        })
        .withFailureHandler(function(err) {
            btn.innerHTML = "Simpan Alamat"; btn.disabled = false;
            Swal.fire('Error Sistem', err.message, 'error');
        })
        .updateAgenAddress(state.user.email, addrData);
}
