<!DOCTYPE html>
<html lang="id">
<head>
    <base target="_top"> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin Panel - Laleh.id</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        serif: ['Lora', 'serif']
                    },
                    colors: {
                        laleh: {
                            mocha: '#825E4A',      
                            mochaHover: '#6d4d3c',
                            black: '#111111',
                            bg: '#F9FAFB',
                            accent: '#FDF8F5'
                        }
                    }
                }
            }
        }
    </script>

    <!-- SweetAlert2, Lucide Icons, ExcelJS & FileSaver -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        body { background-color: #F9FAFB; color: #111111; -webkit-tap-highlight-color: transparent; }
        .sidebar-active { 
            background-color: #FDF8F5; 
            color: #825E4A; 
            font-weight: 600; 
            border-right: 4px solid #825E4A; 
        }
        .swal2-styled.swal2-confirm { background-color: #825E4A !important; border-radius: 12px !important; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(130, 94, 74, 0.08); }
        
        /* Custom Scrollbar Styling */
        .modal-scroll::-webkit-scrollbar, .custom-scroll::-webkit-scrollbar { width: 6px; height: 8px; }
        .modal-scroll::-webkit-scrollbar-track, .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .modal-scroll::-webkit-scrollbar-thumb, .custom-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .modal-scroll::-webkit-scrollbar-thumb:hover, .custom-scroll::-webkit-scrollbar-thumb:hover { background: #825E4A; }

        /* ANIMASI PESANAN/AGEN BARU GOYANG */
        @keyframes gentle-shake {
            0% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
            100% { transform: translateX(0); }
        }
        .animate-shake { animation: gentle-shake 0.5s ease-in-out; }
        .highlight-new { background-color: #fff7ed !important; transition: background-color 2s ease-out; }
    </style>
</head>
<body class="antialiased">

    <!-- App Container -->
    <div id="app" class="flex h-screen overflow-hidden"></div>

<script>
// ==========================================
// 1. STATE MANAGEMENT
// ==========================================
let state = {
    view: 'home',
    user: null,
    stats: { totalAgen: 0, totalProduk: 0, totalPesanan: 0 },
    products: [], 
    orders: [],
    agents: [],
    orderView: 'per_order', 
    searchQuery: '', 
    searchAgentQuery: '', 
    searchFinanceQuery: '', 
    ekspedisiList: [], // MENYIMPAN DAFTAR EKSPEDISI DARI BACKEND
    lastSeenOrderCount: parseInt(localStorage.getItem('laleh_lastSeenOrderCount')) || 0,
    unreadOrderCount: 0, 
    newOrderIds: [],
    lastSeenAgentCount: parseInt(localStorage.getItem('laleh_lastSeenAgentCount')) || 0,
    unreadAgentCount: 0,
    newAgentIds: [],
    reviews: null
};

// --- SESSION CHECKER ---
const savedUser = localStorage.getItem('laleh_user');
const rawUrl = "<?= typeof url !== 'undefined' ? url : '' ?>"; 
const appUrl = rawUrl.startsWith('http') ? rawUrl : '';
let pollingInterval = null; 

function safeRedirect(page) {
    if (!appUrl) {
        Swal.fire('Navigasi', `Mode Preview: Menuju halaman ${page}`, 'info');
        return;
    }
    const targetUrl = appUrl + "?page=" + page;
    try { window.top.location.href = targetUrl; } catch (e) { window.location.href = targetUrl; }
}

function formatSafeDate(dateVal) {
    if (!dateVal) return '-';
    const d = new Date(dateVal);
    if (isNaN(d.getTime())) return 'Tgl Invalid';
    return d.toLocaleDateString('id-ID', {day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'});
}

function toDatetimeLocal(isoStr) {
    if (!isoStr) return '';
    const d = new Date(isoStr);
    if (isNaN(d.getTime())) return '';
    const pad = (n) => n < 10 ? '0' + n : n;
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

/**
 * FUNGSI LOAD DATA DARI BACKEND
 */
function loadStats() {
    if (typeof google === 'undefined') return;
    google.script.run
        .withSuccessHandler(function(res) {
            state.stats.totalAgen = res.totalAgen;
            state.stats.totalProduk = res.totalProduk;
            state.stats.totalPesanan = res.totalPesanan;
            renderApp();
        })
        .getAdminStats();
}

function loadProducts() {
    if (typeof google === 'undefined') {
        state.products = [
            { 
                id: 'PRD-1', name: 'ABAYA LIYYORA JETBLACK', price: 'Rp 270.000', rawPrice: 270000, originalPrice: 300000, originalPriceFormatted: 'Rp 300.000', discount: 10, 
                sizes: 'S, M, L', colors: 'Jetblack, Hazelnut', status: 'Aktif',
                sizeDetails: [
                    {size: 'S', weight: 250, originalPrice: 300000, discount: 10, finalPrice: 270000},
                    {size: 'M', weight: 260, originalPrice: 300000, discount: 10, finalPrice: 270000},
                    {size: 'L', weight: 280, originalPrice: 320000, discount: 10, finalPrice: 288000}
                ]
            }
        ];
        return;
    }
    google.script.run
        .withSuccessHandler(function(res) {
            state.products = res || [];
            renderApp();
        })
        .withFailureHandler(function(err) {
            console.error("Gagal load produk:", err);
        })
        .getAvailableProducts();
}

function loadOrders() {
    if (typeof google === 'undefined') {
        state.orders = [
            { id_pesanan: 'ORD-01', nama_agen: 'Janah Galeri', email_agen: 'janah@laleh.com', nama_produk: 'ABAYA LIYYORA JETBLACK', qty: 1, total_harga: 288000, ukuran: 'L', warna: 'Hazelnut', catatan: 'BELUM ONGKIR', status: 'Menunggu', berat: 280 },
            { id_pesanan: 'ORD-02', nama_agen: 'Hiva', email_agen: 'hiva@laleh.com', nama_produk: 'ABAYA LIYYORA JETBLACK', qty: 2, total_harga: 540000, ukuran: 'M', warna: 'Jetblack', catatan: 'LUNAS', status: 'Diproses', berat: 520 }
        ];
        state.unreadOrderCount = 2; 
        renderApp();
        return;
    }

    google.script.run
        .withSuccessHandler(function(res) {
            state.orders = res || [];
            updateUnreadCount();
            renderApp();
        })
        .getAllOrders(); 
}

function loadAgents() {
    if (typeof google === 'undefined') {
        state.agents = [
            { id: 'AGN-001', name: 'Janah Galeri', email: 'janah@laleh.com', registerDate: '12/10/2023', address: '<span class="font-semibold text-gray-700">Janah</span><br>Jl. Merdeka No 1, Kab. Bandung' }
        ];
        state.unreadAgentCount = 1; // Simulasi badge agen baru di mode preview
        renderApp();
        return;
    }

    google.script.run
        .withSuccessHandler(function(res) {
            state.agents = res || [];
            updateUnreadAgentCount();
            renderApp();
        })
        .getAllAgents();
}

function loadEkspedisi() {
    if (typeof google === 'undefined') {
        state.ekspedisiList = []; // Dikosongkan untuk preview agar tes input web
        return;
    }
    google.script.run
        .withSuccessHandler(function(res) {
            state.ekspedisiList = res || [];
        })
        .getEkspedisiList();
}

// Background Polling Real-Time Terpadu (Pesanan & Agen)
function startPolling() {
    if (pollingInterval) clearInterval(pollingInterval);
    pollingInterval = setInterval(() => {
        if (typeof google !== 'undefined') {
            // Polling Pesanan
            google.script.run
                .withSuccessHandler(function(res) {
                    const fetchedOrders = res || [];
                    if (fetchedOrders.length !== state.orders.length) {
                        state.orders = fetchedOrders;
                        state.stats.totalPesanan = state.orders.length; 
                        updateUnreadCount();
                        renderApp();
                    }
                })
                .getAllOrders();

            // Polling Data Agen
            google.script.run
                .withSuccessHandler(function(res) {
                    const fetchedAgents = res || [];
                    if (fetchedAgents.length !== state.agents.length) {
                        state.agents = fetchedAgents;
                        state.stats.totalAgen = state.agents.length; 
                        updateUnreadAgentCount();
                        renderApp();
                    }
                })
                .getAllAgents();
        }
    }, 10000); 
}

function updateUnreadCount() {
    if (state.view === 'orders') {
        const unread = Math.max(0, state.orders.length - state.lastSeenOrderCount);
        if (unread > 0) {
            state.newOrderIds = state.orders.slice(0, unread).map(o => o.id_pesanan);
        }
        state.lastSeenOrderCount = state.orders.length;
        localStorage.setItem('laleh_lastSeenOrderCount', state.lastSeenOrderCount);
        state.unreadOrderCount = 0;
    } else {
        state.unreadOrderCount = Math.max(0, state.orders.length - state.lastSeenOrderCount);
    }
}

// Logika Update Notifikasi Agen
function updateUnreadAgentCount() {
    if (state.view === 'agents') {
        const unread = Math.max(0, state.agents.length - state.lastSeenAgentCount);
        if (unread > 0) {
            // Asumsi agen terbaru ada di array indeks paling depan (dari backend.reverse())
            state.newAgentIds = state.agents.slice(0, unread).map(a => a.id);
        }
        state.lastSeenAgentCount = state.agents.length;
        localStorage.setItem('laleh_lastSeenAgentCount', state.lastSeenAgentCount);
        state.unreadAgentCount = 0;
    } else {
        state.unreadAgentCount = Math.max(0, state.agents.length - state.lastSeenAgentCount);
    }
}

// Inisialisasi User & Panggil Data
if (typeof google === 'undefined') {
    state.user = { name: 'Admin Preview', email: 'admin@laleh.com', role: 'Admin' };
    loadEkspedisi(); 
    loadProducts();
    loadOrders(); 
    loadAgents();
    renderApp();
} else if (savedUser) {
    const parsedUser = JSON.parse(savedUser);
    if (parsedUser.role.toLowerCase() === 'admin') {
        state.user = parsedUser;
        loadEkspedisi(); 
        renderApp(); 
        loadStats(); 
        loadProducts();
        loadOrders();
        loadAgents(); 
        startPolling(); 
    } else {
        safeRedirect('home');
    }
} else {
    safeRedirect('signin');
}

function navigateTo(view) {
    state.view = view;
    state.searchQuery = ''; 
    state.searchAgentQuery = ''; 
    state.searchFinanceQuery = ''; // Reset form pencarian keuangan saat pindah halaman
    if (view === 'orders') {
        updateUnreadCount();
    }
    if (view === 'agents') {
        updateUnreadAgentCount();
    }
    renderApp();
}

function handleLogout() {
    Swal.fire({
        title: 'Keluar?', text: 'Anda akan keluar dari Panel Admin.', icon: 'warning',
        showCancelButton: true, confirmButtonColor: '#825E4A', confirmButtonText: 'Ya, Keluar', cancelButtonText: 'Batal'
    }).then((result) => {
        if (result.isConfirmed) {
            if (pollingInterval) clearInterval(pollingInterval); 
            localStorage.removeItem('laleh_user');
            safeRedirect('signin');
        }
    });
}

function changeOrderView(viewType) {
    state.orderView = viewType;
    renderApp();
}

function handleSearchInput(e) {
    state.searchQuery = e.target.value.toLowerCase().trim();
    filterOrders(state.searchQuery);
}

function filterOrders(query) {
    if (state.view !== 'orders') return;
    
    if (state.orderView === 'per_order') {
        const rows = document.querySelectorAll('.order-row');
        rows.forEach(row => {
            const agentData = row.getAttribute('data-agent') || '';
            if (agentData.includes(query)) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    } else {
        const groups = document.querySelectorAll('.order-group');
        groups.forEach(group => {
            const agentData = group.getAttribute('data-agent') || '';
            if (agentData.includes(query)) {
                group.style.display = '';
            } else {
                group.style.display = 'none';
            }
        });
    }
}

// ==========================================
// FUNGSI PENCARIAN DATA AGEN 
// ==========================================
function handleAgentSearchInput(e) {
    state.searchAgentQuery = e.target.value.toLowerCase().trim();
    filterAgents(state.searchAgentQuery);
}

function filterAgents(query) {
    if (state.view !== 'agents') return;
    const rows = document.querySelectorAll('.agent-row');
    rows.forEach(row => {
        const searchData = row.getAttribute('data-search') || '';
        if (searchData.includes(query)) {
            row.style.display = '';
        } else {
            row.style.display = 'none';
        }
    });
}

// ==========================================
// FUNGSI PENCARIAN LAPORAN KEUANGAN
// ==========================================
function handleFinanceSearchInput(e) {
    state.searchFinanceQuery = e.target.value.toLowerCase().trim();
    filterFinance(state.searchFinanceQuery);
}

function filterFinance(query) {
    if (state.view !== 'finance') return;
    const rows = document.querySelectorAll('.finance-row');
    rows.forEach(row => {
        const searchData = row.getAttribute('data-search') || '';
        if (searchData.includes(query)) {
            row.style.display = '';
        } else {
            row.style.display = 'none';
        }
    });
}

// ==========================================
// FUNGSI MANAJEMEN TAGIHAN (FINANCE)
// ==========================================
function addPengirimanRow(ekspedisi = '', nominal = '') {
    const container = document.getElementById('b_pengiriman_container');
    const div = document.createElement('div');
    div.className = 'flex gap-2 mb-2 items-center pengiriman-row';
    
    // Menyusun opsi dropdown dari database
    let optionsHtml = '<option value="" disabled selected hidden>Pilih Ekspedisi...</option>';
    state.ekspedisiList.forEach(eks => {
        const isSelected = (eks === ekspedisi) ? 'selected' : '';
        optionsHtml += `<option value="${eks}" ${isSelected}>${eks}</option>`;
    });
    
    // Fallback: Jika ada data ekspedisi lama yang sudah tidak ada di list Settings
    if (ekspedisi && !state.ekspedisiList.includes(ekspedisi)) {
        optionsHtml += `<option value="${ekspedisi}" selected>${ekspedisi} (Data Lama)</option>`;
    }

    div.innerHTML = `
        <select class="w-1/2 px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:border-laleh-mocha outline-none p_ekspedisi cursor-pointer bg-white">
            ${optionsHtml}
        </select>
        <input type="number" placeholder="Ongkir (Rp)" value="${nominal}" class="w-1/2 px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:border-laleh-mocha outline-none p_nominal" oninput="hitungTotalOngkir(); hitungTotalDana();">
        <button type="button" onclick="this.parentElement.remove(); hitungTotalOngkir(); hitungTotalDana();" class="text-red-500 bg-red-50 p-1.5 rounded-lg hover:bg-red-100 shrink-0"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
    `;
    container.appendChild(div);
    lucide.createIcons();
}

function hitungTotalOngkir() {
    let total = 0;
    document.querySelectorAll('.p_nominal').forEach(input => {
        total += parseInt(input.value) || 0;
    });
    document.getElementById('b_total_ongkir_text').innerText = "Rp " + total.toLocaleString('id-ID');
    document.getElementById('b_ongkir').value = total;
}

function openBillingModal(email) {
    const agent = state.agents.find(a => a.email === email);
    if (!agent) return;
    
    document.getElementById('b_email').value = email;
    document.getElementById('b_agent_name').innerText = agent.name;
    
    const ongkir = agent.billing ? parseInt(agent.billing.ongkir) || 0 : 0;
    const dana_masuk = agent.billing && agent.billing.dana_masuk ? parseInt(agent.billing.dana_masuk) || 0 : 0;
    const status = agent.billing ? agent.billing.status_pembayaran : 'Belum Lunas';
    const pengiriman = agent.billing && agent.billing.pengiriman ? agent.billing.pengiriman : [];

    // Render Baris Pengiriman Dinamis
    const container = document.getElementById('b_pengiriman_container');
    container.innerHTML = '';
    if (pengiriman.length > 0) {
        pengiriman.forEach(p => addPengirimanRow(p.ekspedisi, p.ongkir));
    } else {
        // Fallback untuk data lama
        if(ongkir > 0) addPengirimanRow('Ekspedisi', ongkir);
        else addPengirimanRow('', ''); 
    }
    hitungTotalOngkir();
    
    // Inisialisasi Kalkulator Penjumlahan Dana Otomatis
    document.getElementById('b_dana_sebelumnya_val').value = dana_masuk;
    document.getElementById('b_dana_sebelumnya_text').innerText = "Rp " + dana_masuk.toLocaleString('id-ID');
    document.getElementById('b_tambah_dana').value = ""; // Kosongkan field input baru
    document.getElementById('b_total_akhir_text').innerText = "Rp " + dana_masuk.toLocaleString('id-ID');
    
    document.getElementById('b_status').value = status;
    
    const modal = document.getElementById('modal-billing');
    if(modal) {
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }
}

function hitungTotalDana() {
    const sblm = parseInt(document.getElementById('b_dana_sebelumnya_val').value) || 0;
    const tambah = parseInt(document.getElementById('b_tambah_dana').value) || 0;
    const totalAkhir = sblm + tambah;
    
    document.getElementById('b_total_akhir_text').innerText = "Rp " + totalAkhir.toLocaleString('id-ID');
}

function closeBillingModal() {
    const modal = document.getElementById('modal-billing');
    if(modal) {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }
}

function submitBilling(e) {
    e.preventDefault();
    const email = document.getElementById('b_email').value;
    
    // Tarik data array pengiriman
    let pengirimanArr = [];
    document.querySelectorAll('.pengiriman-row').forEach(row => {
        let eks = row.querySelector('.p_ekspedisi').value;
        let nom = parseInt(row.querySelector('.p_nominal').value) || 0;
        if(eks || nom > 0) pengirimanArr.push({ ekspedisi: eks, ongkir: nom });
    });

    const ongkir = parseInt(document.getElementById('b_ongkir').value) || 0;
    
    // Menggabungkan total pembayaran
    const sblm = parseInt(document.getElementById('b_dana_sebelumnya_val').value) || 0;
    const tambah = parseInt(document.getElementById('b_tambah_dana').value) || 0;
    const dana_masuk_akhir = sblm + tambah;
    
    const status = document.getElementById('b_status').value;
    const btn = document.getElementById('btnSaveBilling');
    
    btn.innerHTML = "Menyimpan...";
    btn.disabled = true;

    if (typeof google === 'undefined') {
        setTimeout(() => {
            let agent = state.agents.find(a => a.email === email);
            if(agent) agent.billing = { pengiriman: pengirimanArr, ongkir: ongkir, dana_masuk: dana_masuk_akhir, status_pembayaran: status };
            Swal.fire({icon: 'success', title: 'Berhasil', text: 'Tagihan disimpan (Preview)', confirmButtonColor: '#825E4A'});
            closeBillingModal();
            renderApp();
            btn.innerHTML = "Simpan Perubahan";
            btn.disabled = false;
        }, 1000);
        return;
    }

    google.script.run
        .withSuccessHandler(function(res) {
            btn.innerHTML = "Simpan Perubahan";
            btn.disabled = false;
            if(res.success) {
                closeBillingModal();
                Swal.fire({icon: 'success', title: 'Berhasil!', text: res.message, timer: 1500, showConfirmButton: false});
                loadAgents(); // Refresh data agen dari server untuk update UI
            } else {
                Swal.fire('Gagal', res.message, 'error');
            }
        })
        .withFailureHandler(function(err) {
            btn.innerHTML = "Simpan Perubahan";
            btn.disabled = false;
            Swal.fire('Error Sistem', err.message, 'error');
        })
        .updateAgentBilling(email, pengirimanArr, ongkir, dana_masuk_akhir, status);
}

// ==========================================
// FUNGSI KELOLA JASA KIRIM (EKSPEDISI) MODAL
// ==========================================
function openEkspedisiModal() {
    renderEkspedisiListModal();
    const modal = document.getElementById('modal-ekspedisi');
    if(modal) { modal.classList.remove('hidden'); modal.classList.add('flex'); }
}

function closeEkspedisiModal() {
    const modal = document.getElementById('modal-ekspedisi');
    if(modal) { modal.classList.add('hidden'); modal.classList.remove('flex'); }
}

function renderEkspedisiListModal() {
    const container = document.getElementById('list_ekspedisi_container');
    container.innerHTML = '';
    if(state.ekspedisiList.length === 0) {
        container.innerHTML = '<p class="text-xs text-gray-400 text-center py-4" id="empty_ekspedisi_msg">Belum ada data ekspedisi.</p>';
        return;
    }
    state.ekspedisiList.forEach(eks => {
        addEkspedisiUiElement(eks);
    });
}

function addEkspedisiUiElement(name) {
    const container = document.getElementById('list_ekspedisi_container');
    const emptyMsg = document.getElementById('empty_ekspedisi_msg');
    if(emptyMsg) emptyMsg.remove();
    
    const div = document.createElement('div');
    div.className = 'flex justify-between items-center bg-white border border-gray-200 px-3 py-2 rounded-lg mb-2 shadow-sm ekspedisi-item';
    div.innerHTML = `
        <span class="text-xs font-bold text-gray-700 e-name">${name}</span>
        <button type="button" onclick="this.parentElement.remove()" class="text-red-500 hover:bg-red-50 p-1.5 rounded-md transition"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
    `;
    container.appendChild(div);
    lucide.createIcons();
}

function addNewEkspedisiUi() {
    const input = document.getElementById('input_new_ekspedisi');
    const val = input.value.trim();
    if(!val) return;
    addEkspedisiUiElement(val);
    input.value = ''; // Kosongkan input setelah ditambah
    input.focus();
}

function saveEkspedisiList() {
    const items = document.querySelectorAll('.ekspedisi-item .e-name');
    const newList = [];
    items.forEach(el => newList.push(el.innerText.trim()));
    
    const btn = document.getElementById('btnSaveEkspedisi');
    btn.innerHTML = "Menyimpan..."; btn.disabled = true;

    if (typeof google === 'undefined') {
        setTimeout(() => {
            state.ekspedisiList = newList; // Update State
            closeEkspedisiModal();
            Swal.fire('Berhasil', 'Daftar Jasa Kirim disimpan (Preview)', 'success');
            btn.innerHTML = "Simpan Perubahan"; btn.disabled = false;
        }, 1000);
        return;
    }

    google.script.run
        .withSuccessHandler(function(res) {
            btn.innerHTML = "Simpan Perubahan"; btn.disabled = false;
            if(res.success) {
                state.ekspedisiList = newList; // Update data di UI secara realtime
                closeEkspedisiModal();
                Swal.fire({icon: 'success', title: 'Berhasil!', text: res.message, timer: 1500, showConfirmButton: false});
            } else {
                Swal.fire('Gagal', res.message, 'error');
            }
        })
        .withFailureHandler(function(err) {
            btn.innerHTML = "Simpan Perubahan"; btn.disabled = false;
            Swal.fire('Error Sistem', err.message, 'error');
        })
        .updateEkspedisiList(newList);
}

// FUNGSI EXPORT KE EXCEL (PESANAN)
// ==========================================
async function exportToExcel() {
    if (typeof ExcelJS === 'undefined') {
        Swal.fire('Error', 'Sistem belum siap, pastikan koneksi internet lancar untuk memuat library Excel.', 'error');
        return;
    }

    Swal.fire({ title: 'Menyiapkan File Excel...', text: 'Mohon tunggu sebentar', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

    try {
        const workbook = new ExcelJS.Workbook();
        const colorThemes = [
            { main: 'FF825E4A', sub: 'FFFDF8F5', text: 'FF825E4A' }, 
            { main: 'FF0D9488', sub: 'FFF0FDFA', text: 'FF0F766E' }, 
            { main: 'FFE11D48', sub: 'FFFFF1F2', text: 'FFBE123C' }, 
            { main: 'FF4F46E5', sub: 'FFEEF2FF', text: 'FF4338CA' }, 
            { main: 'FFD97706', sub: 'FFFFFBEB', text: 'FFB45309' }, 
            { main: 'FF059669', sub: 'FFECFDF5', text: 'FF047857' }, 
            { main: 'FF9333EA', sub: 'FFFAF5FF', text: 'FF7E22CE' }, 
            { main: 'FF2563EB', sub: 'FFEFF6FF', text: 'FF1D4ED8' }, 
            { main: 'FFDB2777', sub: 'FFFDF2F8', text: 'FFBE185D' }  
        ];

        if (state.orderView === 'per_agen') {
            const worksheet = workbook.addWorksheet('Pesanan Per Agen');
            worksheet.properties.defaultRowHeight = 21;

            let groupedOrders = {};
            if (state.orders && state.orders.length > 0) {
                state.orders.forEach(o => {
                    if (!groupedOrders[o.email_agen]) {
                        groupedOrders[o.email_agen] = { nama_agen: o.nama_agen, email_agen: o.email_agen, orders: [] };
                    }
                    groupedOrders[o.email_agen].orders.push(o);
                });
            }

            let currentRow = 1;

            const getAgentAddress = (email) => {
                const agent = state.agents.find(a => a.email === email);
                if (!agent || !agent.address) return '-';
                return agent.address.replace(/<br\s*[\/]?>/gi, ', ').replace(/<[^>]*>?/gm, '').trim();
            };

            let exportProducts = [];
            state.products.forEach(p => {
                let isAktif = p.status === 'Aktif';
                let productOrders = state.orders.filter(o => o.id_produk === p.id || o.nama_produk === p.name);
                if (isAktif || productOrders.length > 0) {
                    let sizes = p.sizeDetails && p.sizeDetails.length > 0 ? p.sizeDetails.map(d=>d.size) : (p.sizes ? p.sizes.split(',').map(s=>s.trim()) : []);
                    let colors = p.colors ? p.colors.split(',').map(c=>c.trim()) : [];
                    let allOrderedColors = productOrders.map(o => o.warna);
                    let allOrderedSizes = productOrders.map(o => o.ukuran);
                    
                    let uniqueColors = [...new Set([...colors, ...allOrderedColors])].filter(Boolean);
                    let uniqueSizes = [...new Set([...sizes, ...allOrderedSizes])].filter(Boolean);

                    if(uniqueColors.length === 0) uniqueColors = ['-'];
                    if(uniqueSizes.length === 0) uniqueSizes = ['-'];

                    exportProducts.push({ ...p, exportColors: uniqueColors, exportSizes: uniqueSizes });
                }
            });

            for (let email in groupedOrders) {
                let group = groupedOrders[email];
                let agentTotalQty = group.orders.reduce((sum, o) => sum + (parseInt(o.qty) || 0), 0);
                let agentTotalPrice = group.orders.reduce((sum, o) => sum + (parseInt(o.total_harga) || 0), 0);
                let agentTotalWeight = group.orders.reduce((sum, o) => sum + (parseInt(o.berat) || 0), 0);

                let nameRow = worksheet.getRow(currentRow);
                nameRow.height = 21;
                worksheet.mergeCells(currentRow, 1, currentRow, 8); 
                let nameCell = nameRow.getCell(1);
                nameCell.value = `NAMA AGEN: ${group.nama_agen.toUpperCase()}`;
                nameCell.font = { name: 'Arial', size: 10, bold: true };
                nameCell.alignment = { vertical: 'middle' };
                currentRow++;

                let addrRow = worksheet.getRow(currentRow);
                addrRow.height = 21;
                worksheet.mergeCells(currentRow, 1, currentRow, 8);
                let addrCell = addrRow.getCell(1);
                addrCell.value = `Alamat: ${getAgentAddress(email)}`;
                addrCell.font = { name: 'Arial', size: 9, italic: true, color: { argb: 'FF666666' } };
                addrCell.alignment = { vertical: 'top', wrapText: true };
                currentRow++;

                worksheet.getRow(currentRow).height = 10;
                currentRow++;

                let themeIndex = 0;
                let tableStartRow = currentRow;
                let currentCol = 1;
                let maxRowForAgent = tableStartRow; 

                exportProducts.forEach((p) => {
                    let agentProductOrders = group.orders.filter(o => o.id_produk === p.id || o.nama_produk === p.name);
                    let uniqueColors = p.exportColors;
                    let uniqueSizes = p.exportSizes;

                    let theme = colorThemes[themeIndex % colorThemes.length];
                    let totalCols = 1 + uniqueSizes.length + 1; 
                    let localRow = tableStartRow;

                    worksheet.getColumn(currentCol).width = 25;
                    for(let i=0; i<uniqueSizes.length; i++) {
                        worksheet.getColumn(currentCol + 1 + i).width = 8;
                    }
                    worksheet.getColumn(currentCol + 1 + uniqueSizes.length).width = 40;
                    worksheet.getColumn(currentCol + totalCols).width = 3; 

                    let prodRow = worksheet.getRow(localRow);
                    worksheet.mergeCells(localRow, currentCol, localRow, currentCol + totalCols - 1);
                    let prodCell = prodRow.getCell(currentCol);
                    prodCell.value = p.name;
                    prodCell.fill = { type: 'pattern', pattern:'solid', fgColor:{argb: theme.main} };
                    prodCell.font = { name: 'Arial', size: 10, bold: true, color: {argb: 'FFFFFFFF'} };
                    prodCell.alignment = { horizontal: 'center', vertical: 'middle' };
                    prodRow.height = 21;
                    localRow++;

                    let headerRow = worksheet.getRow(localRow);
                    headerRow.height = 21;
                    headerRow.getCell(currentCol).value = "Warna";
                    uniqueSizes.forEach((s, idx) => {
                        headerRow.getCell(currentCol + 1 + idx).value = s;
                    });
                    headerRow.getCell(currentCol + 1 + uniqueSizes.length).value = "Keterangan";

                    for(let i=0; i<totalCols; i++) {
                        let cell = headerRow.getCell(currentCol + i);
                        cell.fill = { type: 'pattern', pattern:'solid', fgColor:{argb: theme.sub} };
                        cell.font = { name: 'Arial', size: 10, bold: true, color: {argb: theme.text} };
                        cell.alignment = { horizontal: 'center', vertical: 'middle' };
                        cell.border = { top: {style:'thin', color: {argb:'FFCCCCCC'}}, left: {style:'thin', color: {argb:'FFCCCCCC'}}, bottom: {style:'medium', color: {argb:'FFCCCCCC'}}, right: {style:'thin', color: {argb:'FFCCCCCC'}} };
                    }
                    localRow++;

                    let productTotalQty = 0;
                    let productTotalWeight = 0;
                    uniqueColors.forEach(c => {
                        let colorOrders = agentProductOrders.filter(o => o.warna === c);
                        let row = worksheet.getRow(localRow);
                        row.height = 21;

                        let colorCell = row.getCell(currentCol);
                        colorCell.value = c;
                        colorCell.font = { name: 'Arial', size: 10, bold: true };
                        colorCell.alignment = { vertical: 'middle' };
                        
                        uniqueSizes.forEach((s, idx) => {
                            let ordersForSize = colorOrders.filter(o => o.ukuran === s);
                            let qty = ordersForSize.reduce((acc, curr) => acc + (parseInt(curr.qty) || 0), 0);
                            let cell = row.getCell(currentCol + 1 + idx);
                            cell.value = qty > 0 ? qty : '-'; 
                            cell.font = { name: 'Arial', size: 10, bold: true };
                            cell.alignment = { horizontal: 'center', vertical: 'middle' };
                        });

                        let notes = colorOrders.length > 0 ? [...new Set(colorOrders.map(o => o.catatan).filter(n=>n))].join(', ') : '';
                        let ketCell = row.getCell(currentCol + 1 + uniqueSizes.length);
                        ketCell.value = notes;
                        ketCell.font = { name: 'Arial', size: 10 };
                        ketCell.alignment = { vertical: 'middle' };

                        for(let i=0; i<totalCols; i++) {
                            row.getCell(currentCol + i).border = { top: {style:'thin', color: {argb:'FFCCCCCC'}}, left: {style:'thin', color: {argb:'FFCCCCCC'}}, bottom: {style:'thin', color: {argb:'FFCCCCCC'}}, right: {style:'thin', color: {argb:'FFCCCCCC'}} };
                        }
                        
                        productTotalQty += colorOrders.reduce((sum, o) => sum + (parseInt(o.qty) || 0), 0);
                        productTotalWeight += colorOrders.reduce((sum, o) => sum + (parseInt(o.berat) || 0), 0);
                        localRow++;
                    });

                    let footRow = worksheet.getRow(localRow);
                    footRow.height = 21;
                    let fCell1 = footRow.getCell(currentCol);
                    fCell1.value = "TOTAL";
                    fCell1.font = { name: 'Arial', size: 10, bold: true };
                    fCell1.fill = { type: 'pattern', pattern:'solid', fgColor:{argb: 'FFF3F4F6'} }; 
                    fCell1.alignment = { horizontal: 'right', vertical: 'middle' };

                    if(uniqueSizes.length > 1) {
                        worksheet.mergeCells(localRow, currentCol + 1, localRow, currentCol + uniqueSizes.length);
                    }
                    
                    let fCell2 = footRow.getCell(currentCol + 1);
                    fCell2.value = productTotalQty > 0 ? `${productTotalQty} (${productTotalWeight} gr)` : '-';
                    fCell2.font = { name: 'Arial', size: 11, bold: true, color: {argb: 'FF825E4A'} };
                    fCell2.fill = { type: 'pattern', pattern:'solid', fgColor:{argb: 'FFF3F4F6'} };
                    fCell2.alignment = { horizontal: 'center', vertical: 'middle' };

                    for(let i=0; i<totalCols; i++) {
                        let cell = footRow.getCell(currentCol + i);
                        if (!cell.fill) cell.fill = { type: 'pattern', pattern:'solid', fgColor:{argb: 'FFF3F4F6'} };
                        cell.border = { top: {style:'medium', color: {argb:'FFA3A8B8'}}, left: {style:'thin', color: {argb:'FFCCCCCC'}}, bottom: {style:'thin', color: {argb:'FFCCCCCC'}}, right: {style:'thin', color: {argb:'FFCCCCCC'}} };
                    }
                    localRow++;
                    
                    if (localRow > maxRowForAgent) maxRowForAgent = localRow;
                    currentCol += totalCols + 1; 
                    themeIndex++;
                });

                currentRow = maxRowForAgent + 1;

                let sumRow1 = worksheet.getRow(currentRow);
                sumRow1.height = 21;
                sumRow1.getCell(1).value = "TOTAL KESELURUHAN ITEM & BERAT";
                sumRow1.getCell(1).font = { name: 'Arial', size: 10, bold: true };
                sumRow1.getCell(2).value = `${agentTotalQty} pcs (${agentTotalWeight} gr)`;
                sumRow1.getCell(2).font = { name: 'Arial', size: 10, bold: true, color: {argb: 'FF825E4A'} };
                currentRow++;

                let sumRow2 = worksheet.getRow(currentRow);
                sumRow2.height = 21;
                sumRow2.getCell(1).value = "TOTAL TAGIHAN";
                sumRow2.getCell(1).font = { name: 'Arial', size: 10, bold: true };
                sumRow2.getCell(2).value = "Rp " + agentTotalPrice.toLocaleString('id-ID');
                sumRow2.getCell(2).font = { name: 'Arial', size: 10, bold: true, color: {argb: 'FF059669'} };
                currentRow++;

                worksheet.getRow(currentRow).height = 21;
                currentRow++;
            }
        } 
        // ==============================================================
        // LOGIKA EXPORT: TAMPILAN REKAP TOTAL SEMUA PESANAN
        // ==============================================================
        else if (state.orderView === 'rekap_produk') {
            const worksheet = workbook.addWorksheet('Rekap Total Pesanan');
            worksheet.properties.defaultRowHeight = 21;
            let currentRow = 1;

            worksheet.mergeCells(currentRow, 1, currentRow, 5);
            let titleCell = worksheet.getCell(currentRow, 1);
            titleCell.value = "REKAPITULASI TOTAL PESANAN SELURUH AGEN";
            titleCell.font = { name: 'Arial', size: 12, bold: true };
            titleCell.alignment = { vertical: 'middle' };
            currentRow += 2;

            let exportProducts = [];
            state.products.forEach(p => {
                let productOrders = state.orders.filter(o => o.id_produk === p.id || o.nama_produk === p.name);
                if (p.status === 'Aktif' || productOrders.length > 0) {
                    let sizes = p.sizeDetails && p.sizeDetails.length > 0 ? p.sizeDetails.map(d=>d.size) : (p.sizes ? p.sizes.split(',').map(s=>s.trim()) : []);
                    let colors = p.colors ? p.colors.split(',').map(c=>c.trim()) : [];

                }

            exportProducts.forEach(p => {

                let uniqueSizes = p.exportSizes;
                
                let totalCols = 1 + uniqueSizes.length + 1; 

                worksheet.getColumn(1).width = 25; 
                for(let i=0; i<uniqueSizes.length; i++) {
                    worksheet.getColumn(2 + i).width = 10; 
                }
                worksheet.getColumn(totalCols).width = 30;

                let prodRow = worksheet.getRow(currentRow);
                prodRow.height = 21;
                worksheet.mergeCells(currentRow, 1, currentRow, totalCols);
                let prodCell = prodRow.getCell(1);
                prodCell.value = p.name;
                prodCell.fill = { type: 'pattern', pattern:'solid', fgColor:{argb: theme.main} };
                prodCell.font = { name: 'Arial', size: 10, bold: true, color: {argb: 'FFFFFFFF'} };
                prodCell.alignment = { horizontal: 'center', vertical: 'middle' };
                currentRow++;

                let headerRow = worksheet.getRow(currentRow);
                headerRow.height = 21;
                headerRow.getCell(1).value = "Warna";
                uniqueSizes.forEach((s, idx) => {
                    headerRow.getCell(2 + idx).value = s;
                });
                headerRow.getCell(totalCols).value = "Keterangan";

                for(let i=1; i<=totalCols; i++) {
                    let cell = headerRow.getCell(i);
                    cell.fill = { type: 'pattern', pattern:'solid', fgColor:{argb: theme.sub} };
                    cell.font = { name: 'Arial', size: 10, bold: true, color: {argb: theme.text} };
                    cell.alignment = { horizontal: 'center', vertical: 'middle' };
                    cell.border = { top: {style:'thin', color: {argb:'FFCCCCCC'}}, left: {style:'thin', color: {argb:'FFCCCCCC'}}, bottom: {style:'medium', color: {argb:'FFCCCCCC'}}, right: {style:'thin', color: {argb:'FFCCCCCC'}} };
                }
                currentRow++;

                let productTotalQty = 0;
                let productTotalPrice = 0;

                uniqueColors.forEach(c => {
                    let colorOrders = p.productOrders.filter(o => o.warna === c);
                    let row = worksheet.getRow(currentRow);
                    row.height = 21;

                    let colorCell = row.getCell(1);
                    colorCell.value = c;
                    colorCell.font = { name: 'Arial', size: 10, bold: true };
                    colorCell.alignment = { vertical: 'middle' };

                    uniqueSizes.forEach((s, idx) => {
                        let ordersForSize = colorOrders.filter(o => o.ukuran === s);
                        let qty = ordersForSize.reduce((acc, curr) => acc + (parseInt(curr.qty) || 0), 0);
                        let cell = row.getCell(2 + idx);
                        cell.value = qty > 0 ? qty : '-'; 
                        cell.font = { name: 'Arial', size: 10, bold: true };
                        cell.alignment = { horizontal: 'center', vertical: 'middle' };
                    });

                    let notes = colorOrders.length > 0 ? [...new Set(colorOrders.map(o => o.catatan).filter(n=>n))].join(', ') : '';
                    let ketCell = row.getCell(totalCols);
                    ketCell.value = notes;
                    ketCell.font = { name: 'Arial', size: 10 };
                    ketCell.alignment = { vertical: 'middle' };

                    for(let i=1; i<=totalCols; i++) {
                        row.getCell(i).border = { top: {style:'thin', color: {argb:'FFCCCCCC'}}, left: {style:'thin', color: {argb:'FFCCCCCC'}}, bottom: {style:'thin', color: {argb:'FFCCCCCC'}}, right: {style:'thin', color: {argb:'FFCCCCCC'}} };
                    }
                    
                    productTotalQty += colorOrders.reduce((sum, o) => sum + (parseInt(o.qty) || 0), 0);
                    productTotalPrice += colorOrders.reduce((sum, o) => sum + (parseInt(o.total_harga) || 0), 0);
                    currentRow++;
                });

                let footRow = worksheet.getRow(currentRow);
                footRow.height = 21;
                let fCell1 = footRow.getCell(1);
                fCell1.value = "TOTAL " + p.name.toUpperCase();
                fCell1.font = { name: 'Arial', size: 10, bold: true };
                fCell1.fill = { type: 'pattern', pattern:'solid', fgColor:{argb: 'FFF3F4F6'} }; 
                fCell1.alignment = { horizontal: 'right', vertical: 'middle' };

                if(uniqueSizes.length > 0) {
                    worksheet.mergeCells(currentRow, 2, currentRow, totalCols);
                }
                
                let fCell2 = footRow.getCell(2);
                fCell2.value = productTotalQty > 0 ? productTotalQty + " Pcs (Rp " + productTotalPrice.toLocaleString('id-ID') + ")" : '-';
                fCell2.font = { name: 'Arial', size: 10, bold: true, color: {argb: 'FF825E4A'} };
                fCell2.fill = { type: 'pattern', pattern:'solid', fgColor:{argb: 'FFF3F4F6'} };
                fCell2.alignment = { horizontal: 'center', vertical: 'middle' };

                for(let i=1; i<=totalCols; i++) {
                    let cell = footRow.getCell(i);
                    if (!cell.fill) cell.fill = { type: 'pattern', pattern:'solid', fgColor:{argb: 'FFF3F4F6'} };
                    cell.border = { top: {style:'medium', color: {argb:'FFA3A8B8'}}, left: {style:'thin', color: {argb:'FFCCCCCC'}}, bottom: {style:'thin', color: {argb:'FFCCCCCC'}}, right: {style:'thin', color: {argb:'FFCCCCCC'}} };
                }
                currentRow++;

                worksheet.getRow(currentRow).height = 21;
                currentRow++;

                themeIndex++;
            });

            let totalQtyAll = state.orders.reduce((sum, o) => sum + (parseInt(o.qty) || 0), 0);
            let totalPriceAll = state.orders.reduce((sum, o) => sum + (parseInt(o.total_harga) || 0), 0);
            let totalWeightAll = state.orders.reduce((sum, o) => sum + (parseInt(o.berat) || 0), 0);

            let sumRow1 = worksheet.getRow(currentRow);
            sumRow1.height = 21;
            sumRow1.getCell(1).value = "GRAND TOTAL QTY & BERAT KESELURUHAN";
            sumRow1.getCell(1).font = { name: 'Arial', size: 10, bold: true };
            sumRow1.getCell(2).value = `${totalQtyAll} pcs (${totalWeightAll} gr)`;
            sumRow1.getCell(2).font = { name: 'Arial', size: 10, bold: true, color: {argb: 'FF825E4A'} };
            currentRow++;

            let sumRow2 = worksheet.getRow(currentRow);
            sumRow2.height = 21;
            sumRow2.getCell(1).value = "GRAND TOTAL OMSET KESELURUHAN";
            sumRow2.getCell(1).font = { name: 'Arial', size: 10, bold: true };
            sumRow2.getCell(2).value = "Rp " + totalPriceAll.toLocaleString('id-ID');
            sumRow2.getCell(2).font = { name: 'Arial', size: 10, bold: true, color: {argb: 'FF059669'} };
        }

        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        const fileName = state.orderView === 'per_agen' 
            ? "Rekap_Pesanan_Per_Agen_Laleh_" + new Date().toISOString().slice(0,10) + ".xlsx"
            : "Rekap_Total_Keseluruhan_Laleh_" + new Date().toISOString().slice(0,10) + ".xlsx";
        saveAs(blob, fileName);

        Swal.close();

    } catch (error) {
        console.error(error);
        Swal.fire('Error Export', 'Terjadi kesalahan saat memproses file Excel.', 'error');
    }
}

// ==========================================
// FUNGSI EXPORT LAPORAN KEUANGAN KE EXCEL
// ==========================================
async function exportFinanceToExcel() {
    if (typeof ExcelJS === 'undefined') {
        Swal.fire('Error', 'Sistem belum siap, pastikan koneksi internet lancar untuk memuat library Excel.', 'error');
        return;
    }

    Swal.fire({ title: 'Menyiapkan File Excel...', text: 'Mohon tunggu sebentar', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

    try {
        const workbook = new ExcelJS.Workbook();
        const worksheet = workbook.addWorksheet('Laporan Keuangan');

        // 0. KALKULASI DATA KEUANGAN
        let totalOmset = 0;
        let totalOngkir = 0;
        let totalDanaMasuk = 0; 
        let totalPiutang = 0; 
        let financeByAgent = {};

        if (state.orders && state.orders.length > 0) {
            state.orders.forEach(o => {
                let qty = parseInt(o.qty) || 0;
                let harga = parseInt(o.total_harga) || 0;
                let berat = parseInt(o.berat) || 0;

                if (!financeByAgent[o.email_agen]) {
                    financeByAgent[o.email_agen] = {
                        nama_agen: o.nama_agen,
                        email_agen: o.email_agen,
                        total_qty: 0,
                        total_berat: 0,
                        total_harga_barang: 0
                    };
                }
                financeByAgent[o.email_agen].total_qty += qty;
                financeByAgent[o.email_agen].total_berat += berat;
                financeByAgent[o.email_agen].total_harga_barang += harga;
            });
        }
        
        let agentDataArray = [];
        for (let email in financeByAgent) {
            let data = financeByAgent[email];
            let agentObj = state.agents.find(a => a.email === email);
            
            let pengirimanArr = agentObj && agentObj.billing && agentObj.billing.pengiriman ? agentObj.billing.pengiriman : [];
            let ongkir = agentObj && agentObj.billing ? parseInt(agentObj.billing.ongkir) || 0 : 0;
            let dana_masuk = agentObj && agentObj.billing && agentObj.billing.dana_masuk ? parseInt(agentObj.billing.dana_masuk) : 0;
            let statusPembayaran = agentObj && agentObj.billing ? agentObj.billing.status_pembayaran : 'Belum Lunas';
            
            let grandTotal = data.total_harga_barang + ongkir;
            let sisaTagihanRaw = grandTotal - dana_masuk;
            let sisaTagihan = sisaTagihanRaw > 0 ? sisaTagihanRaw : 0;
            
            totalOmset += data.total_harga_barang;
            totalOngkir += ongkir;
            totalDanaMasuk += dana_masuk;
            totalPiutang += sisaTagihan;
            
            // Format rincian multi-resi Jasa Kirim untuk di Excel
            let ongkirListStr = "";
            if (pengirimanArr.length > 0) {
                ongkirListStr = pengirimanArr.map(p => `${p.ekspedisi || 'Kurir'}: Rp ${Number(p.ongkir).toLocaleString('id-ID')}`).join('\n');
                ongkirListStr += `\nTotal Ongkir: Rp ${ongkir.toLocaleString('id-ID')}`;
            } else if (ongkir > 0) {
                ongkirListStr = `Ekspedisi: Rp ${ongkir.toLocaleString('id-ID')}`;
            } else {
                ongkirListStr = `Belum diset`;
            }

            agentDataArray.push({
                nama_agen: data.nama_agen,
                email_agen: data.email_agen,
                item_berat: `${data.total_qty} pcs\n(${data.total_berat} gr)`,
                harga_barang: data.total_harga_barang,
                ongkir_detail: ongkirListStr,
                grand_total: grandTotal,
                telah_dibayar: dana_masuk,
                sisa_tagihan_raw: sisaTagihanRaw,
                status_bayar: statusPembayaran
            });
        }

        // --- MENGATUR LEBAR KOLOM (Sesuai UI Baru) ---
        worksheet.getColumn(1).width = 6;  // No
        worksheet.getColumn(2).width = 25; // Nama Agen
        worksheet.getColumn(3).width = 15; // Item & Berat
        worksheet.getColumn(4).width = 18; // Harga Barang
        worksheet.getColumn(5).width = 25; // Ongkir & Jasa Kirim (Dibuat lebar agar muat rincian)
        worksheet.getColumn(6).width = 18; // Grand Total
        worksheet.getColumn(7).width = 18; // Telah Dibayar
        worksheet.getColumn(8).width = 18; // Sisa Tagihan
        worksheet.getColumn(9).width = 15; // Status Bayar

        // 1. Heading 1 (Row 1)
        let row1 = worksheet.getRow(1);
        row1.height = 25;
        worksheet.mergeCells('A1:I1');
        let cell1 = row1.getCell(1);
        cell1.value = "LAPORAN KEUANGAN & TAGIHAN";
        cell1.font = { name: 'Arial', size: 14, bold: true };
        cell1.alignment = { vertical: 'middle', horizontal: 'center' };

        // 2. Heading 2 (Row 2 - Digabungkan per kategori)
        let row2 = worksheet.getRow(2);
        row2.height = 20;
        worksheet.mergeCells(2, 1, 2, 2); 
        worksheet.mergeCells(2, 3, 2, 4); 
        worksheet.mergeCells(2, 5, 2, 6); 
        worksheet.mergeCells(2, 7, 2, 9); 
        
        const summaryHeaders = ["Total Harga Barang", "Total Ongkir", "Dana Masuk (Lunas/DP)", "Total Piutang (Belum/DP)"];
        summaryHeaders.forEach((text, i) => {
            let colIndex = (i === 3) ? 7 : (i * 2 + 1);
            let cell = row2.getCell(colIndex);
            cell.value = text.toUpperCase();
            cell.font = { name: 'Arial', size: 9, bold: true, color: { argb: 'FF825E4A' } };
            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFDF8F5' } };
            cell.alignment = { vertical: 'middle', horizontal: 'center' };
            cell.border = { top: {style:'medium', color: {argb:'FF825E4A'}}, left: {style:'thin', color: {argb:'FF825E4A'}}, bottom: {style:'thin', color: {argb:'FF825E4A'}}, right: {style:'thin', color: {argb:'FF825E4A'}} };
            
            // Border matching
            if (i === 3) {
                row2.getCell(8).border = cell.border;
                row2.getCell(9).border = cell.border;
            } else {
                row2.getCell(colIndex + 1).border = cell.border;
            }
        });

        // 3. Values/Hasil Angka (Row 3)
        let row3 = worksheet.getRow(3);
        row3.height = 20;
        worksheet.mergeCells(3, 1, 3, 2); 
        worksheet.mergeCells(3, 3, 3, 4); 
        worksheet.mergeCells(3, 5, 3, 6); 
        worksheet.mergeCells(3, 7, 3, 9); 
        
        const summaryValues = [totalOmset, totalOngkir, totalDanaMasuk, totalPiutang];
        summaryValues.forEach((val, i) => {
            let colIndex = (i === 3) ? 7 : (i * 2 + 1);
            let cell = row3.getCell(colIndex);
            cell.value = "Rp " + val.toLocaleString('id-ID');
            cell.font = { name: 'Arial', size: 12, bold: true };
            cell.alignment = { vertical: 'middle', horizontal: 'center' };
            cell.border = { top: {style:'thin', color: {argb:'FF825E4A'}}, left: {style:'thin', color: {argb:'FF825E4A'}}, bottom: {style:'medium', color: {argb:'FF825E4A'}}, right: {style:'thin', color: {argb:'FF825E4A'}} };
            
            if (i === 3) {
                row3.getCell(8).border = cell.border;
                row3.getCell(9).border = cell.border;
            } else {
                row3.getCell(colIndex + 1).border = cell.border;
            }
        });

        // 4. Baris 4 (Spasi)
        let row4 = worksheet.getRow(4);
        row4.height = 16;

        // 5. Heading 3 (Row 5 - Tabel Data Utama)
        let row5 = worksheet.getRow(5);
        row5.height = 16;
        const tableHeaders = ["No.", "Nama Agen", "Item & Berat", "Harga Barang", "Ongkir & Jasa Kirim", "Grand Total", "Telah Dibayar", "Sisa / Kelebihan", "Status Bayar"];
        tableHeaders.forEach((text, i) => {
            let cell = row5.getCell(i + 1);
            cell.value = text.toUpperCase();
            cell.font = { name: 'Arial', size: 9, bold: true, color: { argb: 'FFFFFFFF' } };
            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF825E4A' } };
            cell.alignment = { vertical: 'middle', horizontal: 'center' };
            cell.border = { top: {style:'thin', color: {argb:'FF825E4A'}}, left: {style:'thin', color: {argb:'FF825E4A'}}, bottom: {style:'thin', color: {argb:'FF825E4A'}}, right: {style:'thin', color: {argb:'FF825E4A'}} };
        });

        // 6. Isi Data (Mulai Row 6)
        let currentRow = 6;
        agentDataArray.forEach((agent, index) => {
            let row = worksheet.getRow(currentRow);
            // Tinggi otomatis menyesuaikan teks multiline
            
            row.getCell(1).value = index + 1;
            row.getCell(1).alignment = { horizontal: 'center', vertical: 'middle' };
            
            row.getCell(2).value = agent.nama_agen + '\n' + agent.email_agen;
            row.getCell(2).font = { bold: true };
            row.getCell(2).alignment = { horizontal: 'left', vertical: 'middle', wrapText: true };

            row.getCell(3).value = agent.item_berat;
            row.getCell(3).alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };

            row.getCell(4).value = "Rp " + agent.harga_barang.toLocaleString('id-ID');
            row.getCell(4).alignment = { horizontal: 'right', vertical: 'middle' };

            row.getCell(5).value = agent.ongkir_detail;
            row.getCell(5).font = { italic: true, size: 9 };
            row.getCell(5).alignment = { horizontal: 'right', vertical: 'middle', wrapText: true };

            row.getCell(6).value = "Rp " + agent.grand_total.toLocaleString('id-ID');
            row.getCell(6).font = { bold: true, color: { argb: 'FF825E4A' } };
            row.getCell(6).alignment = { horizontal: 'right', vertical: 'middle' };

            row.getCell(7).value = "Rp " + agent.telah_dibayar.toLocaleString('id-ID');
            row.getCell(7).font = { bold: true, color: { argb: 'FF059669' } }; 
            row.getCell(7).alignment = { horizontal: 'right', vertical: 'middle' };

            let sisaText = "";
            let sisaColor = 'FF000000';
            if (agent.sisa_tagihan_raw > 0) {
                sisaText = "Kurang Rp " + agent.sisa_tagihan_raw.toLocaleString('id-ID');
                sisaColor = 'FFDC2626'; // Merah
            } else if (agent.sisa_tagihan_raw < 0) {
                sisaText = "Lebih Rp " + Math.abs(agent.sisa_tagihan_raw).toLocaleString('id-ID');
                sisaColor = 'FF059669'; // Hijau
            } else {
                sisaText = "Rp 0";
                sisaColor = 'FF6B7280'; // Abu-abu
            }

            row.getCell(8).value = sisaText;
            row.getCell(8).font = { bold: true, color: { argb: sisaColor } };
            row.getCell(8).alignment = { horizontal: 'right', vertical: 'middle' };

            row.getCell(9).value = agent.status_bayar;
            row.getCell(9).alignment = { horizontal: 'center', vertical: 'middle' };

            for(let i=1; i<=9; i++) {
                row.getCell(i).border = { top: {style:'thin', color: {argb:'FFCCCCCC'}}, left: {style:'thin', color: {argb:'FFCCCCCC'}}, bottom: {style:'thin', color: {argb:'FFCCCCCC'}}, right: {style:'thin', color: {argb:'FFCCCCCC'}} };
            }
            
            currentRow++;
        });

        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        saveAs(blob, "Laporan_Keuangan_Laleh_" + new Date().toISOString().slice(0,10) + ".xlsx");

        Swal.close();
    } catch (error) {
        console.error(error);
        Swal.fire('Error Export', 'Terjadi kesalahan saat memproses file Excel Keuangan.', 'error');
    }
}

// ==========================================
// FUNGSI RESET PESANAN (ADMIN)
// ==========================================
function resetOrders() {
    Swal.fire({
        title: 'Reset Semua Pesanan?',
        text: "Pastikan Anda sudah meng-export (download) data ke Excel. Data pesanan yang dihapus tidak dapat dikembalikan!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444', 
        cancelButtonColor: '#825E4A', 
        confirmButtonText: 'Ya, Reset Data!',
        cancelButtonText: 'Batal'
    }).then((result) => {
        if (result.isConfirmed) {
            Swal.fire({ title: 'Menghapus Data...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            if (typeof google === 'undefined') {
                state.orders = [];
                state.stats.totalPesanan = 0;
                renderApp();
                Swal.fire('Berhasil!', 'Data pesanan telah dikosongkan (Preview Mode).', 'success');
                return;
            }

            google.script.run
                .withSuccessHandler(function(res) {
                    if(res.success) {
                        Swal.fire({icon: 'success', title: 'Berhasil!', text: res.message, timer: 2000, showConfirmButton: false});
                        loadOrders(); 
                        loadStats();
                    } else {
                        Swal.fire('Gagal', res.message, 'error');
                    }
                })
                .withFailureHandler(function(err) {
                    Swal.fire('Error Sistem', err.message, 'error');
                })
                .resetOrdersBackEnd();
        }
    });
}

// ==========================================
// KALKULASI DISKON SIZE (DINAMIS)
// ==========================================
function calcSizeDisc(el) {
    const row = el.closest('.size-row');
    const orig = parseFloat(row.querySelector('[name="s_orig"]').value) || 0;
    const disc = parseFloat(row.querySelector('[name="s_disc"]').value) || 0;
    const finalPrice = Math.round(orig - (orig * (disc / 100)));
    row.querySelector('[name="s_final"]').value = finalPrice;
}

function addSizeRow(size = '', weight = '', orig = '', disc = '0', final = '') {
    const container = document.getElementById('sizes-container');
    const div = document.createElement('div');
    div.className = 'size-row grid grid-cols-2 md:grid-cols-6 gap-2 bg-white p-3 rounded-xl border border-gray-200 relative items-end';
    div.innerHTML = `
        <div class="col-span-1 md:col-span-1">
            <label class="block text-[10px] text-gray-500 mb-1">Ukuran</label>
            <input type="text" name="s_size" value="${size}" required placeholder="S/M/All" class="w-full px-2 py-1.5 border border-gray-200 rounded-lg outline-none text-xs focus:border-laleh-mocha">
        </div>
        <div class="col-span-1 md:col-span-1">
            <label class="block text-[10px] text-gray-500 mb-1">Berat (gr)</label>
            <input type="number" name="s_weight" value="${weight}" required placeholder="250" class="w-full px-2 py-1.5 border border-gray-200 rounded-lg outline-none text-xs focus:border-laleh-mocha">
        </div>
        <div class="col-span-1 md:col-span-1">
            <label class="block text-[10px] text-gray-500 mb-1">Harga Asli (Rp)</label>
            <input type="number" name="s_orig" value="${orig}" required placeholder="300000" class="w-full px-2 py-1.5 border border-gray-200 rounded-lg outline-none text-xs focus:border-laleh-mocha" oninput="calcSizeDisc(this)">
        </div>
        <div class="col-span-1 md:col-span-1">
            <label class="block text-[10px] text-gray-500 mb-1">Diskon (%)</label>
            <input type="number" name="s_disc" value="${disc}" required placeholder="10" min="0" max="100" step="any" class="w-full px-2 py-1.5 border border-gray-200 rounded-lg outline-none text-xs focus:border-laleh-mocha" oninput="calcSizeDisc(this)">
        </div>
        <div class="col-span-1 md:col-span-1">
            <label class="block text-[10px] text-gray-500 mb-1">Harga Akhir</label>
            <input type="number" name="s_final" value="${final}" required readonly class="w-full px-2 py-1.5 border border-gray-200 rounded-lg bg-gray-50 outline-none text-xs font-bold text-laleh-mocha">
        </div>
        <div class="col-span-1 md:col-span-1 flex pb-0.5 justify-end">
            <button type="button" onclick="this.closest('.size-row').remove()" class="p-1.5 bg-red-50 text-red-500 rounded-lg hover:bg-red-100">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
        </div>
    `;
    container.appendChild(div);
    lucide.createIcons();
}

function openAddProductModal() {
    const modal = document.getElementById('modal-add-product');
    if(modal) {
        document.getElementById('modal-title').innerText = "Input Produk Baru";
        document.getElementById('p_id').value = ""; 
        document.getElementById('formAddProduct').reset();
        document.getElementById('photo-container-extra').innerHTML = '';
        document.getElementById('sizes-container').innerHTML = '';
        addSizeRow(); 
        
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }
}

function closeAddProductModal() {
    const modal = document.getElementById('modal-add-product');
    if(modal) {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        document.getElementById('formAddProduct').reset();
        document.getElementById('p_id').value = "";
        document.getElementById('photo-container-extra').innerHTML = '';
        document.getElementById('sizes-container').innerHTML = '';
    }
}

function submitNewProduct(e) {
    e.preventDefault();

    let sizeDetails = [];
    let sizeNames = [];
    
    document.querySelectorAll('.size-row').forEach(row => {
        let s = row.querySelector('[name="s_size"]').value.trim();
        let w = row.querySelector('[name="s_weight"]').value;
        let o = row.querySelector('[name="s_orig"]').value;
        let d = row.querySelector('[name="s_disc"]').value;
        let f = row.querySelector('[name="s_final"]').value;
        
        if(s) {
            sizeNames.push(s);
            sizeDetails.push({ size: s, weight: w, originalPrice: o, discount: d, finalPrice: f });
        }
    });

    if (sizeDetails.length === 0) {
        Swal.fire('Peringatan', 'Minimal harus ada 1 varian ukuran produk.', 'warning');
        return;
    }

    const baseSize = sizeDetails[0];
    
    const data = {
        id: document.getElementById('p_id').value,
        name: document.getElementById('p_name').value,
        price: baseSize.finalPrice,
        originalPrice: baseSize.originalPrice,
        discount: baseSize.discount,
        sizes: sizeNames.join(', '), 
        sizeDetails: sizeDetails, 
        colors: document.getElementById('p_colors').value,
        desc: document.getElementById('p_desc').value,
        poStart: document.getElementById('p_postart').value,
        poEnd: document.getElementById('p_poend').value,
        photos: []
    };

    const mainPhoto = document.getElementById('p_mainphoto').value;
    if(mainPhoto) data.photos.push(mainPhoto);

    document.querySelectorAll('input[name="product_photos[]"]').forEach(input => {
        if(input.value) data.photos.push(input.value);
    });

    const btn = document.getElementById('btnSaveProduct');
    btn.innerHTML = "Menyimpan...";
    btn.disabled = true;

    if (typeof google === 'undefined') {
        Swal.fire('Info', 'Mode Preview.', 'info');
        btn.innerHTML = "Simpan Produk";
        btn.disabled = false;
        closeAddProductModal();
        return;
    }

    if (data.id) {
        google.script.run
            .withSuccessHandler(function(res) {
                btn.innerHTML = "Simpan Produk";
                btn.disabled = false;
                if(res.success) {
                    closeAddProductModal();
                    Swal.fire({ icon: 'success', title: 'Berhasil!', text: res.message, confirmButtonColor: '#825E4A' });
                    loadProducts(); 
                    loadStats();    
                } else {
                    Swal.fire('Gagal', res.message, 'error');
                }
            })
            .withFailureHandler(function(err) {
                btn.innerHTML = "Simpan Produk";
                btn.disabled = false;
                Swal.fire('Error Sistem', err.message, 'error');
            })
            .updateProduct(data);
    } else {
        google.script.run
            .withSuccessHandler(function(res) {
                btn.innerHTML = "Simpan Produk";
                btn.disabled = false;
                if(res.success) {
                    closeAddProductModal();
                    Swal.fire({ icon: 'success', title: 'Berhasil!', text: res.message, confirmButtonColor: '#825E4A' });
                    loadProducts(); 
                    loadStats();    
                } else {
                    Swal.fire('Gagal', res.message, 'error');
                }
            })
            .withFailureHandler(function(err) {
                btn.innerHTML = "Simpan Produk";
                btn.disabled = false;
                Swal.fire('Error Sistem', err.message, 'error');
            })
            .addProduct(data);
    }
}

function editProduct(id) {
    const product = state.products.find(p => p.id === id);
    if (!product) {
        Swal.fire('Error', 'Data produk tidak ditemukan di sistem.', 'error');
        return;
    }

    document.getElementById('p_id').value = product.id;
    document.getElementById('p_name').value = product.name;
    document.getElementById('p_colors').value = product.colors;
    document.getElementById('p_desc').value = product.desc;
    document.getElementById('p_postart').value = toDatetimeLocal(product.poStart);
    document.getElementById('p_poend').value = toDatetimeLocal(product.poEnd);

    document.getElementById('sizes-container').innerHTML = '';
    if (product.sizeDetails && product.sizeDetails.length > 0) {
        product.sizeDetails.forEach(s => {
            addSizeRow(s.size, s.weight, s.originalPrice, s.discount, s.finalPrice);
        });
    } else {
        const sizesArr = product.sizes ? product.sizes.split(',').map(s=>s.trim()) : [];
        sizesArr.forEach(s => {
            addSizeRow(s, 0, product.originalPrice || product.rawPrice, product.discount || 0, product.rawPrice);
        });
    }

    document.getElementById('p_mainphoto').value = product.photos && product.photos.length > 0 ? product.photos[0] : '';
    
    const photoContainer = document.getElementById('photo-container-extra');
    photoContainer.innerHTML = '';
    if (product.photos && product.photos.length > 1) {
        for (let i = 1; i < product.photos.length; i++) {
            const div = document.createElement('div');
            div.className = 'flex gap-2 mt-2';
            div.innerHTML = `
                <input type="url" name="product_photos[]" value="${product.photos[i]}" placeholder="Link Foto Tambahan" class="flex-1 px-4 py-2 border border-gray-200 rounded-xl focus:border-laleh-mocha outline-none text-sm">
                <button type="button" onclick="this.parentElement.remove()" class="px-3 py-2 bg-red-50 text-red-500 rounded-xl hover:bg-red-100 shrink-0">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
            `;
            photoContainer.appendChild(div);
        }
    }

    document.getElementById('modal-title').innerText = "Edit Produk";
    const modal = document.getElementById('modal-add-product');
    if(modal) {
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }
    lucide.createIcons();
}

function deleteProduct(id) {
    Swal.fire({
        title: 'Hapus Produk?',
        text: "Produk yang dihapus tidak akan muncul lagi di Katalog Agen.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444', 
        cancelButtonColor: '#825E4A', 
        confirmButtonText: 'Ya, Hapus!',
        cancelButtonText: 'Batal'
    }).then((result) => {
        if (result.isConfirmed) {
            Swal.fire({ title: 'Menghapus...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
            
            if (typeof google === 'undefined') {
                state.products = state.products.filter(p => p.id !== id);
                renderApp();
                Swal.fire('Terhapus!', 'Produk telah dihapus (Preview Mode).', 'success');
                return;
            }

            google.script.run
                .withSuccessHandler(function(res) {
                    if(res.success) {
                        Swal.fire({icon: 'success', title: 'Terhapus!', text: res.message, timer: 1500, showConfirmButton: false});
                        loadProducts(); 
                        loadStats();
                    } else {
                        Swal.fire('Gagal', res.message, 'error');
                    }
                })
                .withFailureHandler(function(err) {
                    Swal.fire('Error Sistem', err.message, 'error');
                })
                .deleteProductBackEnd(id);
        }
    });
}

function changeOrderStatus(orderIdString, selectElement) {
    const newStatus = selectElement.value;
    if (!newStatus) return; 

    Swal.fire({
        title: 'Ubah Status?',
        text: `Status pesanan akan diubah menjadi "${newStatus}".`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#825E4A',
        cancelButtonText: 'Batal',
        confirmButtonText: 'Ya, Ubah'
    }).then((result) => {
        if (result.isConfirmed) {
            Swal.fire({ title: 'Memproses...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
            
            if (typeof google === 'undefined') {
                let ids = orderIdString.split(',');
                ids.forEach(id => {
                    const order = state.orders.find(o => o.id_pesanan === id);
                    if(order) order.status = newStatus;
                });
                renderApp();
                Swal.fire('Berhasil', 'Status berhasil diubah (Preview Mode).', 'success');
                return;
            }

            google.script.run
                .withSuccessHandler(function(res) {
                    if(res.success) {
                        Swal.fire({icon: 'success', title: 'Berhasil', text: res.message, timer: 1500, showConfirmButton: false});
                        loadOrders(); 
                    } else {
                        Swal.fire('Gagal', res.message, 'error');
                        selectElement.value = ""; 
                    }
                })
                .withFailureHandler(function(err) {
                    Swal.fire('Error Sistem', err.message, 'error');
                    selectElement.value = ""; 
                })
                .updateOrderStatusBackEnd(orderIdString, newStatus);
        } else {
            selectElement.value = ""; 
        }
    });
}

                state.orders.forEach(o => {
                    if (o.status === 'Menunggu') countMenunggu++;
                    else if (o.status === 'Diproses') countDiproses++;
                    else if (o.status === 'Selesai' || o.status === 'Dikirim') countSelesai++;

            let totalPesananStatus = countMenunggu + countDiproses + countSelesai;
            let pctSelesai = totalPesananStatus > 0 ? Math.round((countSelesai / totalPesananStatus) * 100) : 0;

        if (state.view === 'agents' && state.searchAgentQuery) filterAgents(state.searchAgentQuery);
        if (state.view === 'finance' && state.searchFinanceQuery) filterFinance(state.searchFinanceQuery);

        if (state.view === 'orders' && state.newOrderIds && state.newOrderIds.length > 0) {
            setTimeout(() => {
                state.newOrderIds = []; 
                document.querySelectorAll('.animate-shake').forEach(el => el.classList.remove('animate-shake', 'highlight-new'));
            }, 3000);
        }
        
        if (state.view === 'agents' && state.newAgentIds && state.newAgentIds.length > 0) {
            setTimeout(() => {
                state.newAgentIds = []; 
                document.querySelectorAll('.animate-shake').forEach(el => el.classList.remove('animate-shake', 'highlight-new'));
            }, 3000);
        }
        
    } catch(err) {
        console.error("Terjadi masalah saat menggambar UI:", err);
    }
}
</script>
</body>
</html>
